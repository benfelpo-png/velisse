<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Fabric Ops — Inventory, Rolls & Fulfillment</title>
<script src="/vendor/qrcode.min.js"></script>
<script src="/vendor/jsQR.min.js"></script>
<style>
:root{
  --ink:#1b1f2c; --ink2:#5a6072; --indigo:#2e3d8f; --indigo-d:#232f6e;
  --selvage:#e4572e; --ok:#2e7d5b; --warn:#c4402f; --hold:#a8781c;
  --bg:#f1f1ec; --surface:#ffffff; --line:#dcd9cf; --line2:#ecebe4;
  --chip:#eef0f8; --mono:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
  --cond:'Arial Narrow','Helvetica Neue Condensed',system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{font:15px/1.45 -apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;color:var(--ink);background:var(--bg);padding-bottom:76px}
button{font:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font:inherit;color:var(--ink);background:var(--surface);border:1px solid var(--line);border-radius:8px;padding:10px 12px;width:100%}
input:focus,select:focus,textarea:focus{outline:2px solid var(--indigo);outline-offset:0;border-color:var(--indigo)}
label{display:block;font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--ink2);margin:12px 0 4px}
a{color:var(--indigo)}
/* Header */
header{position:sticky;top:0;z-index:40;background:var(--ink);color:#fff;padding:10px 14px;display:flex;align-items:center;gap:10px}
.brand{font-family:var(--cond);font-weight:700;font-size:19px;letter-spacing:.14em;text-transform:uppercase;white-space:nowrap}
.brand b{color:var(--selvage)}
.hdr-sel{margin-left:auto;display:flex;gap:6px;min-width:0}
.hdr-sel select{background:#2a2f3e;color:#fff;border:1px solid #3a4054;font-size:12px;padding:6px 8px;border-radius:6px;max-width:130px}
/* Selvage strip signature: dotted edge like a fabric selvage */
.selvage-strip{height:6px;background:repeating-linear-gradient(90deg,var(--selvage) 0 10px,transparent 10px 20px);opacity:.9}
/* Layout */
main{padding:14px;max-width:960px;margin:0 auto}
.page-title{font-family:var(--cond);font-size:13px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--ink2);margin:2px 0 12px;display:flex;align-items:center;gap:8px}
.page-title:after{content:'';flex:1;border-top:1px dashed var(--line)}
.card{background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:14px;margin-bottom:12px}
.card h3{font-size:15px;margin-bottom:8px}
.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.muted{color:var(--ink2);font-size:13px}
.sm{font-size:12px}
.mono{font-family:var(--mono);font-size:12px}
.right{margin-left:auto}
/* Buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;background:var(--indigo);color:#fff;font-weight:600;font-size:14px;padding:10px 14px;border-radius:8px}
.btn:active{background:var(--indigo-d)}
.btn.sec{background:var(--chip);color:var(--indigo)}
.btn.ghost{background:none;border:1px solid var(--line);color:var(--ink)}
.btn.danger{background:#fbeae7;color:var(--warn)}
.btn.small{padding:6px 10px;font-size:13px;border-radius:7px}
.btn.block{width:100%}
.btn:disabled{opacity:.45;cursor:default}
/* Chips & badges */
.chip{display:inline-block;background:var(--chip);color:var(--indigo);font-size:11px;font-weight:700;padding:2px 8px;border-radius:99px;letter-spacing:.04em}
.badge{display:inline-block;font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:2px 7px;border-radius:4px}
.b-ok{background:#e2f1ea;color:var(--ok)} .b-warn{background:#fbeae7;color:var(--warn)}
.b-hold{background:#f7ecd4;color:var(--hold)} .b-mut{background:var(--line2);color:var(--ink2)}
.b-ind{background:var(--chip);color:var(--indigo)}
/* List rows */
.li{display:flex;gap:10px;align-items:center;padding:11px 2px;border-bottom:1px solid var(--line2)}
.li:last-child{border-bottom:none}
.li .grow{flex:1;min-width:0}
.li .t{font-weight:600;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.li .s{font-size:12px;color:var(--ink2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.swatch{width:34px;height:34px;border-radius:7px;border:1px solid var(--line);flex:none;background:#eee}
.tap{cursor:pointer}
.tap:active{background:var(--line2)}
/* Yardage bar */
.ybar{height:10px;border-radius:6px;background:var(--line2);overflow:hidden;display:flex;margin:6px 0 2px}
.ybar .cur{background:var(--indigo)} .ybar .res{background:var(--selvage)}
.ylegend{font-size:11px;color:var(--ink2);display:flex;gap:10px}
.ylegend i{display:inline-block;width:8px;height:8px;border-radius:2px;margin-right:3px;vertical-align:baseline}
/* Stats */
.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:12px}
.stat{background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:12px}
.stat .n{font-family:var(--cond);font-size:26px;font-weight:700;letter-spacing:.02em}
.stat .l{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--ink2)}
/* Tables */
table.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{font-size:10.5px;text-transform:uppercase;letter-spacing:.07em;color:var(--ink2);text-align:left;padding:6px 8px;border-bottom:1px solid var(--line)}
.tbl td{padding:8px;border-bottom:1px solid var(--line2);vertical-align:top}
.tbl tr:last-child td{border-bottom:none}
.tblwrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
/* Tabs (secondary) */
.tabs{display:flex;gap:6px;overflow-x:auto;padding-bottom:8px;margin-bottom:10px;-webkit-overflow-scrolling:touch}
.tabs button{flex:none;background:var(--surface);border:1px solid var(--line);border-radius:99px;padding:7px 13px;font-size:13px;font-weight:600;color:var(--ink2)}
.tabs button.on{background:var(--ink);border-color:var(--ink);color:#fff}
/* Bottom nav */
nav.bottom{position:fixed;left:0;right:0;bottom:0;z-index:40;background:var(--surface);border-top:1px solid var(--line);display:flex;padding:4px 2px calc(4px + env(safe-area-inset-bottom))}
nav.bottom button{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:7px 2px;font-size:10.5px;font-weight:700;letter-spacing:.04em;color:var(--ink2);border-radius:8px}
nav.bottom button.on{color:var(--indigo)}
nav.bottom svg{width:22px;height:22px}
/* Scan FAB */
.fab{position:fixed;right:14px;bottom:calc(74px + env(safe-area-inset-bottom));z-index:41;width:56px;height:56px;border-radius:16px;background:var(--selvage);color:#fff;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 18px rgba(228,87,46,.4)}
.fab svg{width:26px;height:26px}
/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(20,22,30,.55);z-index:60;display:flex;align-items:flex-end;justify-content:center}
@media(min-width:640px){.modal-bg{align-items:center}}
.modal{background:var(--surface);width:100%;max-width:560px;max-height:88vh;overflow:auto;border-radius:16px 16px 0 0;padding:18px 16px calc(18px + env(safe-area-inset-bottom))}
@media(min-width:640px){.modal{border-radius:14px}}
.modal h2{font-family:var(--cond);font-size:15px;letter-spacing:.12em;text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center}
.modal h2 .x{margin-left:auto;font-size:22px;color:var(--ink2);padding:0 4px}
.modal .actions{display:flex;gap:8px;margin-top:16px}
.modal .actions .btn{flex:1}
/* Roll ticket (viewer header) */
.ticket{background:var(--surface);border:1px solid var(--ink);border-radius:10px;overflow:hidden;margin-bottom:12px}
.ticket .th{background:var(--ink);color:#fff;padding:8px 12px;display:flex;align-items:center;gap:8px}
.ticket .th .code{font-family:var(--mono);font-size:13px;letter-spacing:.06em}
.ticket .tb{padding:12px}
.ticket .selvage-strip{height:5px}
/* QR box */
.qrbox{background:#fff;padding:8px;border:1px solid var(--line);border-radius:8px;display:inline-block}
.qrbox svg,.qrbox img{display:block;width:120px;height:120px}
/* Toast */
#toast{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(84px + env(safe-area-inset-bottom));z-index:70;background:var(--ink);color:#fff;padding:10px 16px;border-radius:99px;font-size:13px;font-weight:600;opacity:0;transition:opacity .2s;pointer-events:none;max-width:90vw;text-align:center}
#toast.show{opacity:1}
/* Search */
.search{position:relative;margin-bottom:10px}
.search input{padding-left:34px}
.search svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:var(--ink2)}
/* Video scan */
#scanvideo{width:100%;border-radius:10px;background:#000;max-height:52vh;object-fit:cover}
/* Empty state */
.empty{text-align:center;padding:34px 16px;color:var(--ink2)}
.empty .big{font-family:var(--cond);font-size:17px;letter-spacing:.1em;text-transform:uppercase;margin-bottom:6px;color:var(--ink)}
/* PRINT */
#printarea{display:none}
@media print{
  body>*{display:none!important}
  body{padding:0;background:#fff}
  #printarea{display:block!important}
  .plabel{page-break-inside:avoid;border:2px solid #000;border-radius:6px;padding:10px;margin:0 0 10px;width:4in;font-family:-apple-system,sans-serif}
  .plabel .ph{font-family:var(--cond);font-weight:700;letter-spacing:.1em;text-transform:uppercase;font-size:12px;border-bottom:2px solid #000;padding-bottom:4px;margin-bottom:6px;display:flex;justify-content:space-between}
  .plabel .big{font-size:18px;font-weight:800}
  .plabel .mono{font-family:var(--mono)}
  .plabel table{width:100%;font-size:11px;border-collapse:collapse}
  .plabel td{padding:2px 4px;border-bottom:1px dotted #999}
  .psheet{page-break-after:always;font-size:12px;padding:12px}
  .psheet h1{font-family:var(--cond);font-size:16px;letter-spacing:.12em;text-transform:uppercase;border-bottom:2px solid #000;padding-bottom:6px;margin-bottom:10px}
  .psheet table{width:100%;border-collapse:collapse;font-size:11px}
  .psheet th{text-align:left;border-bottom:1.5px solid #000;padding:4px}
  .psheet td{border-bottom:1px solid #ccc;padding:4px;vertical-align:top}
  .pqr{float:right;margin-left:8px}
}
</style>
</head>
<body>
<header>
  <div class="brand">Fabric<b>·</b>Ops</div>
  <div class="hdr-sel">
    <select id="hdrStore" onchange="setStore(this.value)"></select>
    <select id="hdrPerson" onchange="setPerson(this.value)"></select>
  </div>
</header>
<div class="selvage-strip"></div>
<main id="view"></main>

<button class="fab" onclick="go('scan')" aria-label="Scan">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 7V5a2 2 0 012-2h2M17 3h2a2 2 0 012 2v2M21 17v2a2 2 0 01-2 2h-2M7 21H5a2 2 0 01-2-2v-2M3 12h18"/></svg>
</button>

<nav class="bottom" id="bottomnav"></nav>
<div id="modalroot"></div>
<div id="toast"></div>
<div id="printarea"></div>
<script>
/* ============ tiny helpers ============ */
const $=s=>document.querySelector(s);
const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const fmt=n=>Number(n||0).toLocaleString(undefined,{maximumFractionDigits:2});
const money=n=>'$'+Number(n||0).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2});
const today=()=>new Date().toISOString().slice(0,10);
const now=()=>new Date().toISOString();
const dshort=iso=>iso?new Date(iso).toLocaleDateString(undefined,{month:'short',day:'numeric'}):'—';
function toast(m){const t=$('#toast');t.textContent=m;t.classList.add('show');clearTimeout(t._x);t._x=setTimeout(()=>t.classList.remove('show'),2200)}
function pad(n,w){return String(n).padStart(w,'0')}
</script>
<script>
/* ============ data layer ============ */
let db=null, saveTimer=null;
const EMPTY=()=>({v:1,seq:{roll:0,order:0,transfer:0,route:0,txn:0,po:0,cc:0},
 families:[],types:[],templates:[],variants:[],sellableSkus:[],
 rolls:[],stores:[],locations:[],people:[],customers:[],suppliers:[],
 transactions:[],rollHistory:[],orders:[],lineItems:[],allocations:[],
 transfers:[],routes:[],stops:[],cycleCounts:[],ccLines:[],
 syncLog:[],printJobs:[],scanEvents:[],
 settings:{storeId:null,personId:null,lowStockYards:15,
  qbo:{invAsset:'Inventory Asset',cogs:'Cost of Goods Sold',sales:'Sales of Product Income',ap:'Accounts Payable',shrink:'Inventory Shrinkage'},
  shopify:{domain:'',locationMap:{}}, erply:{clientCode:'',groupMap:{}}}});
function uid(){return 'x'+Date.now().toString(36)+Math.random().toString(36).slice(2,8)}
function nextCode(kind,prefix,w=6){db.seq[kind]=(db.seq[kind]||0)+1;return prefix+'-'+pad(db.seq[kind],w)}
/* ============ storage: cloud database (worker D1) → localStorage → artifact storage ============ */
const DBKEY='velisse-db',LEGACY_DBKEYS=['fabric'+'ops-db'];
let syncState={mode:'memory',rev:0,lastSync:null,syncing:false,error:''};
let forceCloudPull=false;
let migrationChanged=false;
function hasLocal(){try{return typeof localStorage!=='undefined'&&(localStorage.setItem('__t','1'),localStorage.removeItem('__t'),true)}catch(e){return false}}
function hasArtifact(){return typeof window!=='undefined'&&window.storage&&typeof window.storage.get==='function'}
async function loadDB(){
  db=EMPTY();
  try{if(hasLocal()){const r=[DBKEY].concat(LEGACY_DBKEYS).map(k=>localStorage.getItem(k)).find(Boolean);if(r){db=JSON.parse(r);syncState.mode='local'}}}catch(e){}
  if(syncState.mode==='memory'&&hasArtifact()){
    try{let r=await window.storage.get(DBKEY);for(const k of LEGACY_DBKEYS){if(!r||!r.value)r=await window.storage.get(k)}if(r&&r.value){db=JSON.parse(r.value);syncState.mode='artifact'}}catch(e){}
  }
  migrate();
  applyConnectionHash();
  syncState.rev=db._rev||0;
  if(migrationChanged)persistLocal();
  /* cloud database: worker configured → pull, newest rev wins */
  if(shopCfg().workerUrl){await cloudPull(true)}
}
function migrate(){
  const e=EMPTY();for(const k in e){if(db[k]===undefined)db[k]=e[k]}for(const k in e.settings){if(db.settings[k]===undefined)db.settings[k]=e.settings[k]}
  if(upgradeLegacyDemoState())migrationChanged=true;
}
function isLegacyDemoState(){
  const codes=(db.stores||[]).map(s=>s.code);
  if(codes.includes('BUF'))return false;
  if(!codes.includes('BK')&&!codes.includes('WH1'))return false;
  const oldPeople=['Ben A.','Maria G.','Devon P.','Sasha L.','Omar R.'];
  const oldBins=['BK-FLOOR-A1','BK-BACK-B2','BK-STAGE','BK-VAN-1','WH-A-01-1','WH-A-01-2','WH-B-02-1','WH-STAGE'];
  const oldTemplates=['Classic 4-Way Sequin','Royal Stretch Velvet','Duchess Bridal Satin'];
  return codes.includes('BK')||codes.includes('WH1')||
    (db.people||[]).some(p=>oldPeople.includes(p.name))||
    (db.locations||[]).some(l=>oldBins.includes(l.binCode))||
    (db.templates||[]).some(t=>oldTemplates.includes(t.displayName));
}
function upgradeLegacyDemoState(){
  if(!isLegacyDemoState())return false;
  const oldShop=Object.assign({},(db.settings&&db.settings.shopify)||{});
  db=EMPTY();
  Object.assign(shopCfg(),oldShop);
  ensureInventorySetup();
  db.settings.scanMode='inventory';db._rev=0;
  if(oldShop.workerUrl&&oldShop.apiKey)forceCloudPull=true;
  return true;
}
function persistLocal(){
  const j=JSON.stringify(db);let ok=false;
  try{if(hasLocal()){localStorage.setItem(DBKEY,j);ok=true;if(syncState.mode==='memory')syncState.mode='local'}}catch(e){syncState.error='local: '+e.message}
  if(hasArtifact()){window.storage.set(DBKEY,j).then(()=>{if(!ok&&syncState.mode==='memory')syncState.mode='artifact'}).catch(()=>{});ok=true}
  if(!ok)toast('⚠ Running in memory only — nothing persists on this device');
  return ok;
}
function save(){clearTimeout(saveTimer);saveTimer=setTimeout(()=>{persistLocal();scheduleCloudPush()},300)}
function applyConnectionHash(){
  if(typeof location==='undefined'||!location.hash)return;
  const raw=location.hash.replace(/^#/,'');const p=new URLSearchParams(raw);
  const key=p.get('key')||p.get('apiKey');
  const pull=p.get('pull')==='1'||p.get('forcePull')==='1';
  const url=(p.get('url')||((typeof location!=='undefined'&&location.origin)?location.origin+'/api':'')).replace(/\/+$/,'');
  if(key&&url){
    shopCfg().workerUrl=url;shopCfg().apiKey=key;
    forceCloudPull=true;
    if(typeof history!=='undefined'&&history.replaceState)history.replaceState(null,'',location.pathname+location.search);
    persistLocal();
    toast('Cloud sync configured on this device');
  }else if(pull&&shopCfg().workerUrl&&shopCfg().apiKey){
    forceCloudPull=true;
    if(typeof history!=='undefined'&&history.replaceState)history.replaceState(null,'',location.pathname+location.search);
    toast('Pulling cloud database on this device');
  }
}
/* --- cloud sync: compare-and-swap on rev, newest wins, conflicts pull server --- */
let cloudPushTimer=null;
function scheduleCloudPush(){if(!shopCfg().workerUrl)return;clearTimeout(cloudPushTimer);cloudPushTimer=setTimeout(()=>cloudPush(),2000)}
async function cloudPush(){
  const s=shopCfg();if(!s.workerUrl||syncState.syncing)return;
  syncState.syncing=true;
  try{
    const r=await workerFetch('/db',{rev:syncState.rev,data:db,device:me().name||'device'});
    syncState.rev=r.rev;db._rev=r.rev;syncState.lastSync=now();syncState.error='';
    persistLocal();
  }catch(e){
    if(e.conflict){
      /* someone else saved first: adopt server state */
      await cloudPull(false);
      toast('Updated from cloud database (saved elsewhere)');render();
    }else{syncState.error=e.message}
  }
  syncState.syncing=false;
  if(route.page==='sync')render();
}
async function cloudPull(boot){
  const s=shopCfg();if(!s.workerUrl)return;
  syncState.syncing=true;
  try{
    const r=await workerFetch('/db');
    if(r&&r.data&&r.rev>0&&(forceCloudPull||(r.rev||0)>=(syncState.rev||0))){
      const keepConn={workerUrl:s.workerUrl,apiKey:s.apiKey};
      const keepDevice={storeId:db.settings.storeId,personId:db.settings.personId};
      db=typeof r.data==='string'?JSON.parse(r.data):r.data;migrate();
      Object.assign(shopCfg(),keepConn); /* never lose the connection settings we just used */
      if(keepDevice.storeId&&byId('stores',keepDevice.storeId))db.settings.storeId=keepDevice.storeId;
      if(keepDevice.personId&&byId('people',keepDevice.personId))db.settings.personId=keepDevice.personId;
      syncState.rev=r.rev;db._rev=r.rev;syncState.mode='cloud';syncState.lastSync=now();syncState.error='';
      forceCloudPull=false;
      persistLocal();if(!boot)render();
    }else if(syncState.rev>(r.rev||0)){
      /* local is ahead (offline edits or first connect): push up */
      await cloudPush();syncState.mode='cloud';
    }else{syncState.mode='cloud';syncState.lastSync=now()}
  }catch(e){syncState.error=e.message}
  syncState.syncing=false;
}
const byId=(coll,id)=>db[coll].find(x=>x.id===id);
const store=id=>byId('stores',id)||{name:'—',code:'—'};
const loc=id=>byId('locations',id)||{binCode:'—',storeId:null};
const person=id=>byId('people',id)||{name:'—'};
const variant=id=>byId('variants',id)||{displayName:'—',colorName:'—'};
const template=id=>byId('templates',id)||{displayName:'—'};
function vname(vid){const v=variant(vid);const t=template(v.templateId);return (t.displayName||'—')+' · '+(v.colorName||'')}
function me(){return byId('people',db.settings.personId)||db.people[0]||{id:null,name:'Guest',role:'admin'}}
function myStore(){return byId('stores',db.settings.storeId)||db.stores[0]||null}
function can(action){const r=me().role;const M={
  receive:['admin','manager','warehouse','cutter'],adjust:['admin','manager','warehouse'],
  cut:['admin','manager','warehouse','cutter'],move:['admin','manager','warehouse','cutter','sales'],
  orders:['admin','manager','sales','warehouse'],deliver:['admin','manager','driver','sales','warehouse'],
  catalog:['admin','manager','photographer'],print:['admin','manager','warehouse','cutter','sales','driver'],
  sync:['admin','manager'],settings:['admin']};
  return (M[action]||['admin']).includes(r)||r==='admin'}
/* availability: rolls in truck/staging or in-transit transfers don't count as sellable */
function rollAvail(r){return Math.max(0,(r.currentYards||0)-(r.reservedYards||0))}
function rollSellable(r){const l=loc(r.locationId);return r.status!=='archived'&&r.status!=='hold'&&!['truck','staging'].includes(l.type)}
/* ============ ledger ============ */
function txn(roll,type,delta,opts={}){
  const prev=roll.currentYards;
  if(delta) roll.currentYards=Math.round((roll.currentYards+delta)*100)/100;
  if(roll.currentYards<0)roll.currentYards=0;
  db.transactions.unshift({id:uid(),code:nextCode('txn','TXN',7),rollId:roll.id,variantId:roll.variantId,
    type,quantityYards:delta,previousYards:prev,newYards:roll.currentYards,
    orderId:opts.orderId||null,lineItemId:opts.lineItemId||null,personId:me().id,
    notes:opts.notes||'',createdAt:now()});
  if(roll.currentYards<=0&&roll.reservedYards<=0&&['sale','damage','adjustment','transfer','sample_cut'].includes(type))roll.status='sold_out';
  roll.updatedAt=now();
}
function moveRoll(roll,toLocId,reason){
  db.rollHistory.unshift({id:uid(),rollId:roll.id,fromLocationId:roll.locationId,toLocationId:toLocId,
    movedAt:now(),personId:me().id,reason:reason||'move'});

<script>
/* ============ router & shell ============ */

const NAV=[
 ['home','Home','M3 11l9-8 9 8M5 9v11h5v-6h4v6h5V9'],
 ['catalog','Catalog','M4 4h7v7H4zM13 4h7v7h-7zM4 13h7v7H4zM13 13h7v7h-7z'],
 ['rolls','Rolls','M12 3a9 9 0 100 18 9 9 0 000-18zM12 8a4 4 0 100 8 4 4 0 000-8z'],
 ['orders','Orders','M6 3h12l1 4H5zM5 7h14v13H5zM9 11h6'],
 ['more','More','M5 12h.01M12 12h.01M19 12h.01']];
function renderNav(){

}
function renderHeader(){

function setStore(id){db.settings.storeId=id;save();render()}
function setPerson(id){db.settings.personId=id;save();render()}
function render(){

/* modal */
function modal(title,body,actions){
  $('#modalroot').innerHTML=`<div class="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal">
    <h2>${esc(title)}<button class="x" onclick="closeModal()">×</button></h2>${body}
    <div class="actions">${actions||''}</div></div></div>`;
}
function closeModal(){$('#modalroot').innerHTML='';stopScanStream()}
function F(id){const el=document.getElementById(id);return el?el.value.trim():''}
function FN(id){return parseFloat(F(id))||0}
/* QR draw: any element with data-qr gets an SVG QR */
function drawQRs(rootSel){
  document.querySelectorAll((rootSel||'')+' [data-qr]').forEach(el=>{
    if(el.dataset.done)return;
    try{const q=qrcode(0,'M');q.addData(el.dataset.qr);q.make();
      el.innerHTML=q.createSvgTag({cellSize:3,margin:0,scalable:true});el.dataset.done='1';
      if(el.dataset.qrsize){const s=el.dataset.qrsize+'px';const svg=el.querySelector('svg');if(svg){svg.style.width=s;svg.style.height=s;svg.style.display='block'}}
    }catch(e){el.innerHTML='<div class="mono sm">'+esc(el.dataset.qr)+'</div>'}
  });
}
/* selectors */
function selOpts(coll,valFn,labelFn,selected){return db[coll].map(x=>`<option value="${x.id}" ${x.id===selected?'selected':''}>${esc(labelFn(x))}</option>`).join('')}
function locOpts(selected,storeFilter){return db.locations.filter(l=>l.active&&(!storeFilter||l.storeId===storeFilter)).map(l=>`<option value="${l.id}" ${l.id===selected?'selected':''}>${esc(store(l.storeId).code+' · '+l.binCode)}</option>`).join('')}
/* ============ HOME ============ */
function vHome(){
  if(db.rolls.length===0&&db.variants.length===0){
    return `<div class="empty"><div class="big">Welcome to Fabric Ops</div>
      <p class="muted" style="margin-bottom:16px">Roll-level fabric inventory, QR workflows, orders, transfers and delivery — built to replace ERPLY.</p>

  }
  const sid=db.settings.storeId;
  const hereLocs=db.locations.filter(l=>l.storeId===sid).map(l=>l.id);

  const avail=hereRolls.filter(rollSellable).reduce((a,r)=>a+rollAvail(r),0);
  const reserved=hereRolls.reduce((a,r)=>a+(r.reservedYards||0),0);
  const openOrders=db.orders.filter(o=>!['completed','canceled'].includes(o.status));

    <div class="stat"><div class="n">${fmt(avail)}</div><div class="l">Yards available here</div></div>

  </div>
  <div class="row" style="margin-bottom:12px">
    <button class="btn" onclick="mReceiveRoll()">+ Receive roll</button>
    <button class="btn sec" onclick="mNewOrder()">+ Order</button>
    <button class="btn ghost" onclick="go('scan')">Scan / count</button>
  </div>
  ${low.length?`<div class="card"><h3>Low stock <span class="badge b-warn">${low.length}</span></h3>
    ${low.map(x=>`<div class="li tap" onclick="go('rolls',null,'${x.v.id}')">
      <div class="swatch" style="background:${x.v.hex||'#eee'}"></div>
      <div class="grow"><div class="t">${esc(vname(x.v.id))}</div><div class="s">${fmt(x.avail)} yd available company-wide</div></div>
      <span class="badge b-warn">${fmt(x.avail)} yd</span></div>`).join('')}</div>`:''}
  <div class="card"><h3>Recent activity</h3>

      <div class="s">${esc(r.code||'')} · ${esc(vname(t.variantId))}</div></div>
      <span class="sm muted">${dshort(t.createdAt)}</span></div>`}).join(''):'<div class="muted sm">No transactions yet.</div>'}
  </div>`;
}
function txnLabel(t){return{receive:'Received',sale:'Cut / sold',sample_cut:'Sample cut',adjustment:'Adjustment',damage:'Damage',return:'Return',transfer:'Transfer',reserve:'Reserved',release_reservation:'Reservation released',cycle_count_variance:'Count variance'}[t]||t}
function lowStock(){
  const th=db.settings.lowStockYards||15;const out=[];
  db.variants.filter(v=>v.active).forEach(v=>{
    const avail=db.rolls.filter(r=>r.variantId===v.id&&rollSellable(r)).reduce((a,r)=>a+rollAvail(r),0);

}

function ybar(r){
  const max=Math.max(r.originalYards||1,r.currentYards||0)||1;
  const availPct=Math.max(0,(r.currentYards-r.reservedYards))/max*100;
  const resPct=(r.reservedYards||0)/max*100;
  return `<span class="cur" style="width:${availPct}%"></span><span class="res" style="width:${resPct}%"></span>`;
}

<script>
/* ============ ROLLS ============ */
let rollQ='',rollFilter='all';
function vRolls(){
  const q=rollQ.toLowerCase();const vfilter=route.tab;
  let rolls=db.rolls.filter(r=>r.status!=='archived');
  if(vfilter)rolls=rolls.filter(r=>r.variantId===vfilter);
  if(rollFilter==='here'){const ls=db.locations.filter(l=>l.storeId===db.settings.storeId).map(l=>l.id);rolls=rolls.filter(r=>ls.includes(r.locationId))}
  if(rollFilter==='remnants')rolls=rolls.filter(r=>['remnant','partial'].includes(r.condition));
  if(rollFilter==='damaged')rolls=rolls.filter(r=>r.condition==='damaged'||r.status==='hold');
  if(q)rolls=rolls.filter(r=>r.code.toLowerCase().includes(q)||(r.lot||'').toLowerCase().includes(q)||vname(r.variantId).toLowerCase().includes(q));
  rolls=rolls.slice().sort((a,b)=>(b.createdAt||'').localeCompare(a.createdAt||''));
  return `<div class="page-title">Rolls ${vfilter?'· '+esc(vname(vfilter)):''}</div>
  <div class="search"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>
  <input placeholder="Search roll, lot, product…" value="${esc(rollQ)}" oninput="rollQ=this.value;render();this.focus();this.setSelectionRange(this.value.length,this.value.length)"></div>
  <div class="tabs">${[['all','All'],['here','At '+(myStore()||{}).code],['remnants','Remnants'],['damaged','Damaged/hold']].map(([k,l])=>`<button class="${rollFilter===k?'on':''}" onclick="rollFilter='${k}';render()">${l}</button>`).join('')}</div>
  ${can('receive')?`<button class="btn block" style="margin-bottom:10px" onclick="mReceiveRoll()">+ Receive roll</button>`:''}
  <div class="card">${rolls.length?rolls.map(r=>{
    const v=variant(r.variantId);
    return `<div class="li tap" onclick="go('roll','${r.id}')">
      <div class="swatch" style="background:${v.hex||'#eee'}"></div>
      <div class="grow"><div class="t">${esc(vname(r.variantId))}</div>
      <div class="ybar">${ybar(r)}</div>
      <div class="s"><span class="mono">${esc(r.code)}</span> · ${fmt(rollAvail(r))} avail · ${esc(loc(r.locationId).binCode)}</div></div>
      </div>`}).join(''):'<div class="empty"><div class="big">No rolls</div><p class="muted">Receive your first roll to start tracking.</p></div>'}</div>`;
}
function vRoll(){
  const r=byId('rolls',route.id);if(!r)return vRolls();
  const v=variant(r.variantId);const l=loc(r.locationId);const st=store(l.storeId);
  const tx=db.transactions.filter(t=>t.rollId===r.id).slice(0,15);
  const hist=db.rollHistory.filter(h=>h.rollId===r.id).slice(0,8);
  const allocs=db.allocations.filter(a=>a.rollId===r.id&&a.status==='reserved');
  return `<div class="page-title"><span class="tap" onclick="go('rolls')">Rolls</span> / ${esc(r.code)}</div>
  <div class="ticket">
    <div class="th"><span class="code">${esc(r.code)}</span>
      <span class="badge ${r.status==='available'?'b-ok':r.status==='sold_out'?'b-mut':'b-hold'}" style="margin-left:auto">${r.status.replace('_',' ')}</span></div>
    <div class="tb"><div class="row">
      <div class="grow"><b>${esc(vname(r.variantId))}</b>
        <div class="sm muted">${r.lot?'Lot '+esc(r.lot)+' · ':''}${r.widthIn||'—'}" wide · received ${esc(r.receivedDate||'—')}</div>
        <div class="ybar" style="height:14px">${ybar(r)}</div>
        <div class="ylegend"><span><i style="background:var(--indigo)"></i>${fmt(rollAvail(r))} yd available</span>
        <span><i style="background:var(--selvage)"></i>${fmt(r.reservedYards)} reserved</span>
        <span>${fmt(r.originalYards)} original</span></div>
        <div class="sm" style="margin-top:8px">📍 <b>${esc(st.name)}</b> · ${esc(l.binCode)} <span class="badge b-ind">${esc(l.type)}</span></div>
        ${r.condition!=='new'?`<div class="sm" style="margin-top:4px"><span class="badge b-hold">${r.condition}</span> ${esc(r.damageNotes||'')}</div>`:''}</div>
      <div class="qrbox" data-qr="${esc(r.qrValue||r.code)}"></div></div></div>
    <div class="selvage-strip"></div>
  </div>
  <div class="row" style="margin-bottom:12px">
    ${can('cut')?`<button class="btn small" onclick="mCut('${r.id}')">✂ Cut</button>`:''}
    ${can('move')?`<button class="btn sec small" onclick="mMove('${r.id}')">Move</button>`:''}
    ${can('adjust')?`<button class="btn ghost small" onclick="mAdjust('${r.id}')">Adjust</button>`:''}
    ${can('adjust')?`<button class="btn ghost small" onclick="mReserve('${r.id}')">Reserve</button>`:''}
    ${can('adjust')?`<button class="btn danger small" onclick="mDamage('${r.id}')">Damage</button>`:''}
    ${can('print')?`<button class="btn ghost small" onclick="printRollLabel('${r.id}')">🖨 Label</button>`:''}
  </div>
  ${allocs.length?`<div class="card"><h3>Reservations on this roll</h3>${allocs.map(a=>{
    const li=byId('lineItems',a.lineItemId)||{};const o=byId('orders',li.orderId)||{};
    return `<div class="li tap" onclick="go('order','${o.id}')"><div class="grow"><div class="t">${esc(o.number||'Manual hold')}</div>
    <div class="s">${fmt(a.allocatedYards)} yd reserved ${a.notes?'· '+esc(a.notes):''}</div></div>
    <button class="btn ghost small" onclick="event.stopPropagation();releaseAlloc('${a.id}')">Release</button></div>`}).join('')}</div>`:''}
  <div class="card"><h3>Ledger</h3><div class="tblwrap"><table class="tbl">
    <tr><th>When</th><th>Type</th><th>Δ yd</th><th>After</th><th>By</th></tr>
    ${tx.map(t=>`<tr><td class="sm">${dshort(t.createdAt)}</td><td>${esc(txnLabel(t.type))}${t.notes?`<div class="sm muted">${esc(t.notes)}</div>`:''}</td>
      <td class="mono">${t.quantityYards>0?'+':''}${fmt(t.quantityYards)}</td><td class="mono">${fmt(t.newYards)}</td><td class="sm">${esc(person(t.personId).name.split(' ')[0])}</td></tr>`).join('')}
  </table></div></div>
  <div class="card"><h3>Movement history</h3>
    ${hist.map(h=>`<div class="li"><div class="grow"><div class="t sm">${esc(loc(h.fromLocationId).binCode||'—')} → ${esc(loc(h.toLocationId).binCode)}</div>
    <div class="s">${esc(h.reason||'')} · ${esc(person(h.personId).name)}</div></div><span class="sm muted">${dshort(h.movedAt)}</span></div>`).join('')||'<span class="muted sm">No moves recorded.</span>'}</div>`;
}
/* roll modals */
function mReceiveRoll(vid){
  if(!db.variants.length){toast('Create a product variant first');go('catalog');return}
  modal('Receive roll',`
    <label>Variant</label><select id="r_v">${db.variants.filter(v=>v.active).map(v=>`<option value="${v.id}" ${v.id===vid?'selected':''}>${esc(vname(v.id))}</option>`).join('')}</select>
    <div class="grid2"><div><label>Yards</label><input id="r_y" type="number" step="0.25" inputmode="decimal"></div>
    <div><label>Lot #</label><input id="r_lot"></div></div>
    <label>Location / bin</label><select id="r_loc">${locOpts(null)}</select>
    <div class="grid2"><div><label>Cost / yd</label><input id="r_c" type="number" step="0.01"></div>
    <div><label>Condition</label><select id="r_cond">${['new','partial','remnant','damaged'].map(c=>`<option>${c}</option>`).join('')}</select></div></div>
    <label>Supplier</label><select id="r_sup"><option value="">—</option>${db.suppliers.map(s=>`<option value="${s.id}">${esc(s.name)}</option>`).join('')}</select>`,
    `<button class="btn" onclick="saveReceive()">Receive & label</button>`);
}
function saveReceive(){
  const yards=FN('r_y');if(yards<=0){toast('Enter yardage');return}
  const v=byId('variants',F('r_v'));
  const code=nextCode('roll','ROLL');
  const r={id:uid(),variantId:v.id,code,lot:F('r_lot'),qrValue:code,originalYards:yards,currentYards:0,reservedYards:0,
    widthIn:template(v.templateId).widthIn,condition:F('r_cond'),receivedDate:today(),supplierId:F('r_sup')||null,
    costPerYard:FN('r_c')||v.costPerYard,locationId:F('r_loc'),status:'available',createdAt:now(),updatedAt:now()};
  db.rolls.push(r);txn(r,'receive',yards,{notes:'Received'+(r.lot?' lot '+r.lot:'')});
  moveRoll(r,r.locationId,'receive');r.locationId=F('r_loc');
  save();closeModal();go('roll',r.id);toast(code+' received');
  setTimeout(()=>printRollLabel(r.id,true),400);
}
function mCut(id){
  const r=byId('rolls',id);
  const allocs=db.allocations.filter(a=>a.rollId===id&&a.status==='reserved');
  modal('Cut from '+r.code,`
    <div class="sm muted">${fmt(r.currentYards)} yd on roll · ${fmt(r.reservedYards)} reserved</div>
    ${allocs.length?`<label>Against reservation</label><select id="c_alloc"><option value="">Ad-hoc cut (walk-in / sample)</option>
      ${allocs.map(a=>{const li=byId('lineItems',a.lineItemId)||{};const o=byId('orders',li.orderId)||{};
      return `<option value="${a.id}">${esc(o.number||'hold')} — ${fmt(a.allocatedYards)} yd reserved</option>`}).join('')}</select>`:'<input type="hidden" id="c_alloc" value="">'}
    <label>Yards cut</label><input id="c_y" type="number" step="0.125" inputmode="decimal">
    <label>Cut type</label><select id="c_type"><option value="sale">sale</option><option value="sample_cut">sample_cut</option></select>
    <label>Notes</label><input id="c_n" placeholder="Order, customer, reason…">
    <label style="display:flex;align-items:center;gap:8px;text-transform:none;font-size:14px;font-weight:500">
      <input type="checkbox" id="c_rem" style="width:auto"> Split remainder off as a new remnant roll</label>`,
    `<button class="btn" onclick="saveCut('${id}')">Record cut</button>`);
}
function saveCut(id){
  const r=byId('rolls',id);const y=FN('c_y');
  if(y<=0||y>r.currentYards){toast('Invalid yardage');return}
  const aId=F('c_alloc');
  txn(r,F('c_type'),-y,{notes:F('c_n')});
  if(aId){const a=byId('allocations',aId);
    a.cutYards=(a.cutYards||0)+y;a.status='cut';a.cutAt=now();
    r.reservedYards=Math.max(0,r.reservedYards-a.allocatedYards);
    const li=byId('lineItems',a.lineItemId);if(li){li.status='cut';advanceOrder(li.orderId)}
    db.transactions[0].orderId=li?li.orderId:null;db.transactions[0].lineItemId=a.lineItemId;
  }
  if(document.getElementById('c_rem')&&document.getElementById('c_rem').checked&&r.currentYards>0){
    const remYards=r.currentYards;
    txn(r,'adjustment',-remYards,{notes:'Split to remnant'});
    const code=nextCode('roll','ROLL');
    const rem={id:uid(),variantId:r.variantId,code,lot:r.lot,qrValue:code,parentRollId:r.id,
      originalYards:remYards,currentYards:0,reservedYards:0,widthIn:r.widthIn,condition:'remnant',receivedDate:today(),
      supplierId:r.supplierId,costPerYard:r.costPerYard,locationId:r.locationId,status:'available',createdAt:now(),updatedAt:now()};
    db.rolls.push(rem);txn(rem,'receive',remYards,{notes:'Remnant from '+r.code});
    r.status='sold_out';
    toast('Remnant '+code+' created');
    setTimeout(()=>printRollLabel(rem.id,true),400);
  }
  save();closeModal();render();
}
function mMove(id){
  const r=byId('rolls',id);
  modal('Move '+r.code,`
    <label>To location</label><select id="m_loc">${locOpts(r.locationId)}</select>
    <label>Reason</label><select id="m_r">${['move','picking','restock','audit','return','staging'].map(x=>`<option>${x}</option>`).join('')}</select>`,
    `<button class="btn" onclick="saveMove('${id}')">Move roll</button>`);
}
function saveMove(id){const r=byId('rolls',id);const to=F('m_loc');if(to===r.locationId){toast('Already there');return}
  moveRoll(r,to,F('m_r'));scanEvent('roll',id,'move');save();closeModal();render();toast('Moved to '+loc(to).binCode)}
function mAdjust(id){
  const r=byId('rolls',id);
  modal('Adjust '+r.code,`
    <div class="sm muted">System shows ${fmt(r.currentYards)} yd</div>
    <label>Measured yards on roll</label><input id="a_y" type="number" step="0.125" value="${r.currentYards}" inputmode="decimal">
    <label>Reason</label><input id="a_n" placeholder="Re-measure, count variance…">`,
    `<button class="btn" onclick="saveAdjust('${id}')">Save adjustment</button>`);
}
function saveAdjust(id){const r=byId('rolls',id);const nY=FN('a_y');const d=Math.round((nY-r.currentYards)*100)/100;
  if(d===0){closeModal();return}
  txn(r,'adjustment',d,{notes:F('a_n')||'Manual adjustment'});
  if(nY>0&&r.status==='sold_out')r.status='available';
  save();closeModal();render();toast((d>0?'+':'')+fmt(d)+' yd adjusted')}
function mReserve(id){
  const r=byId('rolls',id);
  modal('Reserve on '+r.code,`
    <div class="sm muted">${fmt(rollAvail(r))} yd available</div>
    <label>Yards to hold</label><input id="h_y" type="number" step="0.25" inputmode="decimal">
    <label>Hold for</label><input id="h_n" placeholder="Customer / reason">`,
    `<button class="btn" onclick="saveReserve('${id}')">Hold yards</button>`);
}
function saveReserve(id){
  const r=byId('rolls',id);const y=FN('h_y');
  if(y<=0||y>rollAvail(r)){toast('Not enough available');return}
  r.reservedYards+=y;
  db.allocations.push({id:uid(),lineItemId:null,rollId:id,allocatedYards:y,cutYards:0,status:'reserved',personId:me().id,allocatedAt:now(),notes:F('h_n')});
  txn(r,'reserve',0,{notes:'Hold: '+F('h_n')});db.transactions[0].quantityYards=y;
  save();closeModal();render();toast(fmt(y)+' yd reserved');
}
function releaseAlloc(aid){
  const a=byId('allocations',aid);const r=byId('rolls',a.rollId);
  r.reservedYards=Math.max(0,r.reservedYards-a.allocatedYards);a.status='released';
  txn(r,'release_reservation',0,{notes:'Reservation released'});
  const li=byId('lineItems',a.lineItemId);if(li)li.status='open';
  save();render();toast('Reservation released');
}
function mDamage(id){
  const r=byId('rolls',id);
  modal('Report damage — '+r.code,`
    <label>Yards written off</label><input id="d_y" type="number" step="0.25" value="0" inputmode="decimal">
    <label>New condition</label><select id="d_c">${['damaged','partial','hold','new'].map(c=>`<option ${c===r.condition?'selected':''}>${c}</option>`).join('')}</select>
    <label>Notes</label><textarea id="d_n" rows="2" placeholder="Water stain last 3 yards…"></textarea>`,
    `<button class="btn danger" onclick="saveDamage('${id}')">Record damage</button>`);
}

  r.condition=F('d_c');r.damageNotes=F('d_n');
  if(r.condition==='hold')r.status='hold';
  save();closeModal();render();toast('Damage recorded');
}

const ORDER_FLOW=['open','reserved','cut','packed','staged','out_for_delivery','shipped','completed'];

  let os=db.orders.slice().sort((a,b)=>(b.createdAt||'').localeCompare(a.createdAt||''));

      <div class="s">${items.length} line${items.length!==1?'s':''} · ${esc(o.fulfillment)} · ${dshort(o.createdAt)} ${o.shopifyOrderId?'· <span class="chip">Shopify</span>':''}</div></div>
      <span class="badge ${o.status==='completed'?'b-ok':o.status==='canceled'?'b-mut':'b-ind'}">${o.status.replace(/_/g,' ')}</span></div>`}).join('')
    :'<div class="empty"><div class="big">No orders</div><p class="muted">Create a manual order or import from Shopify in Sync.</p></div>'}</div>`;
}
function vOrder(){
  const o=byId('orders',route.id);if(!o)return vOrders();
  const c=byId('customers',o.customerId)||{name:'Walk-in'};
  const items=db.lineItems.filter(l=>l.orderId===o.id);
  const canAdvance=!['completed','canceled'].includes(o.status);
  return `<div class="page-title"><span class="tap" onclick="go('orders')">Orders</span> / ${esc(o.number)}</div>
  <div class="card">
    <div class="row"><div class="grow"><h3>${esc(c.name)}</h3>
      <div class="sm muted">${esc(o.fulfillment)} · ${dshort(o.createdAt)} · origin ${esc(store(o.originStoreId).code)}</div></div>
      <span class="badge b-ind">${o.status.replace(/_/g,' ')}</span></div>
    <div class="row" style="margin-top:10px">
      ${canAdvance?`<button class="btn small" onclick="autoAllocateOrder('${o.id}')">Auto-reserve stock</button>
      <button class="btn sec small" onclick="printPickTicket('${o.id}')">🖨 Pick ticket</button>

      <button class="btn danger small" onclick="cancelOrder('${o.id}')">Cancel</button>`:''}
    </div>
  </div>
  ${items.map(li=>{
    const allocs=db.allocations.filter(a=>a.lineItemId===li.id&&a.status!=='released');
    const allocYd=allocs.reduce((s,a)=>s+a.allocatedYards,0);
    return `<div class="card">
      <div class="row"><div class="grow"><b>${esc(vname(li.variantId))}</b>
        <div class="sm muted">${fmt(li.qty)} × ${esc(li.uom)} → needs ${fmt(li.yardsRequired)} yd · ${money(li.priceEach)} ea</div></div>
        <span class="badge ${li.status==='cut'?'b-ok':li.status==='allocated'?'b-ind':'b-mut'}">${li.status}</span></div>
      ${allocs.length?allocs.map(a=>{
        const r=byId('rolls',a.rollId)||{};
        return `<div class="li"><div class="grow"><div class="t mono sm tap" onclick="go('roll','${a.rollId}')">${esc(r.code||'?')} · ${esc(loc(r.locationId).binCode||'')}</div>
        <div class="s">${fmt(a.allocatedYards)} yd ${a.status==='cut'?'· cut '+fmt(a.cutYards)+' yd ✓':'reserved'}</div></div>
        ${a.status==='reserved'?`<button class="btn small" onclick="mCutAlloc('${a.id}')">✂ Cut</button>`:''}</div>`}).join('')
      :`<div class="sm muted" style="margin-top:6px">Not allocated ${allocYd<li.yardsRequired?'— tap Auto-reserve':''}</div>`}
    </div>`}).join('')}
  ${canAdvance&&o.fulfillment==='local_delivery'?`<div class="card"><h3>Delivery</h3>
    ${o.routeId?`<div class="sm">On route <b class="tap" onclick="go('routed','${o.routeId}')">${esc((byId('routes',o.routeId)||{}).code||'')}</b></div>`
    :`<button class="btn sec small" onclick="mAssignDelivery('${o.id}')">Assign to route</button>`}</div>`:''}
  ${canAdvance?`<div class="card"><h3>Advance status</h3><div class="row">
    ${ORDER_FLOW.slice(ORDER_FLOW.indexOf(o.status)+1,ORDER_FLOW.indexOf(o.status)+3).map(s=>`<button class="btn ghost small" onclick="setOrderStatus('${o.id}','${s}')">${s.replace(/_/g,' ')} →</button>`).join('')}
    <button class="btn small" onclick="setOrderStatus('${o.id}','completed')">Complete ✓</button></div></div>`:''}`;
}
function mNewOrder(){
  if(!db.sellableSkus.length){toast('Create catalog items first');return}
  modal('New order',`
    <label>Customer</label><select id="o_c"><option value="">Walk-in</option>${db.customers.map(c=>`<option value="${c.id}">${esc(c.name)}</option>`).join('')}</select>
    <label>Fulfillment</label><select id="o_f">${['pickup','ship','local_delivery','transfer'].map(f=>`<option>${f}</option>`).join('')}</select>
    <hr style="border:none;border-top:1px dashed var(--line);margin:14px 0">
    <label>First line — sellable SKU</label><select id="o_sku">${db.sellableSkus.filter(s=>s.active).map(s=>`<option value="${s.id}">${esc(s.sku)} — ${esc(vname(s.variantId))}</option>`).join('')}</select>
    <label>Quantity</label><input id="o_q" type="number" step="0.25" value="1" inputmode="decimal">`,
    `<button class="btn" onclick="saveOrder()">Create order</button>`);
}
function saveOrder(){
  const sku=byId('sellableSkus',F('o_sku'));const q=FN('o_q');
  if(!sku||q<=0){toast('Pick a SKU and quantity');return}
  const o={id:uid(),number:nextCode('order','SO'),shopifyOrderId:'',customerId:F('o_c')||null,
    originStoreId:db.settings.storeId,fulfillment:F('o_f'),status:'open',routeId:null,createdAt:now(),updatedAt:now()};
  db.orders.push(o);
  addLine(o.id,sku.id,q);
  save();closeModal();go('order',o.id);toast(o.number+' created');
}
function addLine(orderId,skuId,q){
  const sku=byId('sellableSkus',skuId);
  db.lineItems.push({id:uid(),orderId,skuId,variantId:sku.variantId,qty:q,uom:sku.uom,
    yardsRequired:Math.round(q*sku.drawQty*1000)/1000,priceEach:sku.price,status:'open'});
}
function mAddLine(oid){
  modal('Add line',`
    <label>Sellable SKU</label><select id="l_sku">${db.sellableSkus.filter(s=>s.active).map(s=>`<option value="${s.id}">${esc(s.sku)} — ${esc(vname(s.variantId))}</option>`).join('')}</select>
    <label>Quantity</label><input id="l_q" type="number" step="0.25" value="1" inputmode="decimal">`,
    `<button class="btn" onclick="addLine('${oid}',F('l_sku'),FN('l_q'));save();closeModal();render()">Add</button>`);
}
/* FIFO auto allocation: oldest received rolls first, prefer origin store, respect dye lot by preferring one lot per line */
function autoAllocateOrder(oid){
  const o=byId('orders',oid);let allocated=0;
  db.lineItems.filter(l=>l.orderId===oid&&l.status==='open').forEach(li=>{
    let need=li.yardsRequired - db.allocations.filter(a=>a.lineItemId===li.id&&a.status!=='released').reduce((s,a)=>s+a.allocatedYards,0);
    if(need<=0.0001){li.status='allocated';return}
    const originLocs=db.locations.filter(l=>l.storeId===o.originStoreId).map(l=>l.id);
    let candidates=db.rolls.filter(r=>r.variantId===li.variantId&&rollSellable(r)&&rollAvail(r)>0)
      .sort((a,b)=>{
        const ao=originLocs.includes(a.locationId)?0:1,bo=originLocs.includes(b.locationId)?0:1;
        if(ao!==bo)return ao-bo;
        return (a.receivedDate||'').localeCompare(b.receivedDate||'')||(a.createdAt||'').localeCompare(b.createdAt||'');
      });
    /* dye-lot preference: if one roll can cover the whole need, take the oldest single roll */
    const single=candidates.find(r=>rollAvail(r)>=need);
    if(single)candidates=[single,...candidates.filter(r=>r!==single)];
    for(const r of candidates){
      if(need<=0.0001)break;
      const take=Math.min(need,rollAvail(r));
      r.reservedYards=Math.round((r.reservedYards+take)*1000)/1000;
      db.allocations.push({id:uid(),lineItemId:li.id,rollId:r.id,allocatedYards:take,cutYards:0,status:'reserved',personId:me().id,allocatedAt:now()});
      txn(r,'reserve',0,{notes:'Reserved for '+o.number,orderId:oid,lineItemId:li.id});db.transactions[0].quantityYards=take;
      need-=take;allocated+=take;
    }
    if(need<=0.0001)li.status='allocated';
  });
  if(allocated>0){o.status='reserved';o.updatedAt=now();save();render();toast(fmt(allocated)+' yd reserved (FIFO)')}
  else{const short=db.lineItems.filter(l=>l.orderId===oid&&l.status==='open').length;
    toast(short?'Insufficient sellable stock for '+short+' line(s)':'Already fully allocated')}
}
function mCutAlloc(aid){
  const a=byId('allocations',aid);const r=byId('rolls',a.rollId);
  modal('Cut for order',`
    <div class="sm muted">Roll ${esc(r.code)} — ${fmt(a.allocatedYards)} yd reserved, ${fmt(r.currentYards)} yd on roll</div>
    <label>Actual yards cut</label><input id="ca_y" type="number" step="0.125" value="${a.allocatedYards}" inputmode="decimal">`,
    `<button class="btn" onclick="saveCutAlloc('${aid}')">Record cut</button>`);
}
function saveCutAlloc(aid){
  const a=byId('allocations',aid);const r=byId('rolls',a.rollId);const y=FN('ca_y');
  if(y<=0||y>r.currentYards){toast('Invalid yardage');return}
  const li=byId('lineItems',a.lineItemId);const o=li?byId('orders',li.orderId):null;
  txn(r,'sale',-y,{notes:'Cut for '+(o?o.number:'order'),orderId:o?o.id:null,lineItemId:a.lineItemId});
  r.reservedYards=Math.max(0,Math.round((r.reservedYards-a.allocatedYards)*1000)/1000);
  a.cutYards=y;a.status='cut';a.cutAt=now();
  if(li){const remaining=db.allocations.filter(x=>x.lineItemId===li.id&&x.status==='reserved');
    if(!remaining.length)li.status='cut'}
  if(o)advanceOrder(o.id);
  save();closeModal();render();toast(fmt(y)+' yd cut');
}
function advanceOrder(oid){
  const o=byId('orders',oid);if(!o)return;
  const items=db.lineItems.filter(l=>l.orderId===oid&&l.status!=='canceled');
  if(items.length&&items.every(l=>['cut','packed','shipped'].includes(l.status))&&['open','reserved'].includes(o.status)){o.status='cut';o.updatedAt=now()}
}
function setOrderStatus(oid,s){
  const o=byId('orders',oid);o.status=s;o.updatedAt=now();
  if(s==='completed'){db.lineItems.filter(l=>l.orderId===oid&&l.status==='cut').forEach(l=>l.status='shipped')}
  save();render();toast('Order '+s.replace(/_/g,' '));
}
function cancelOrder(oid){
  db.allocations.filter(a=>{const li=byId('lineItems',a.lineItemId);return li&&li.orderId===oid&&a.status==='reserved'})
    .forEach(a=>{const r=byId('rolls',a.rollId);r.reservedYards=Math.max(0,r.reservedYards-a.allocatedYards);a.status='released';
      txn(r,'release_reservation',0,{notes:'Order canceled'})});
  const o=byId('orders',oid);o.status='canceled';o.updatedAt=now();
  db.lineItems.filter(l=>l.orderId===oid).forEach(l=>{if(l.status!=='cut')l.status='canceled'});
  save();render();toast('Order canceled, reservations released');
}
</script>

    vehicle:F('ro_v'),status:'planned',createdAt:now()};

        ${s.status==='failed'?`<div class="sm" style="color:var(--warn)">✗ Failed — ${esc(s.notes||'')}</div>`:''}</div>
        <span class="badge ${s.status==='delivered'?'b-ok':s.status==='failed'?'b-warn':'b-mut'}">${s.status.replace(/_/g,' ')}</span></div>

}
function mAddStop(rid){
  const r=byId('routes',rid);
  const eligible=db.orders.filter(o=>!['completed','canceled','out_for_delivery','shipped'].includes(o.status)&&!o.routeId);
  if(!eligible.length){toast('No unassigned open orders');return}
  modal('Add stop',`
    <label>Order</label><select id="sp_o">${eligible.map(o=>{const c=byId('customers',o.customerId)||{name:'Walk-in'};
      return `<option value="${o.id}">${esc(o.number)} · ${esc(c.name)}</option>`}).join('')}</select>
    <label>Address</label><input id="sp_a" placeholder="Street address">
    <div class="grid2"><div><label>City</label><input id="sp_city"></div><div><label>ZIP</label><input id="sp_zip"></div></div>`,
    `<button class="btn" onclick="saveStop('${rid}')">Add stop</button>`);
}
function saveStop(rid){
  const o=byId('orders',F('sp_o'));const c=byId('customers',o.customerId)||{};
  const seq=db.stops.filter(s=>s.routeId===rid).length+1;
  db.stops.push({id:uid(),routeId:rid,orderId:o.id,seq,recipient:c.name||'',
    address:F('sp_a')||c.address||'',city:F('sp_city')||c.city||'',zip:F('sp_zip')||c.postal||'',
    status:'planned',deliveredAt:null,podName:'',notes:''});
  o.routeId=rid;o.updatedAt=now();
  save();closeModal();render();toast('Stop added');
}
function loadRoute(rid){
  const r=byId('routes',rid);
  let truck=db.locations.find(l=>l.storeId===r.storeId&&l.type==='truck');
  if(!truck){truck={id:uid(),storeId:r.storeId,type:'truck',binCode:store(r.storeId).code+'-VAN',zone:'Vehicle',qrValue:'BIN-'+store(r.storeId).code+'-VAN',active:true};db.locations.push(truck)}
  db.stops.filter(s=>s.routeId===rid).forEach(s=>{
    const o=byId('orders',s.orderId);if(o){o.status='out_for_delivery';
      /* move cut rolls tied to the order that still have yardage? orders ship cuts; rolls stay. Mark scan events. */
      scanEvent('order',o.id,'load')}
    s.status='out_for_delivery'});
  r.status='out_for_delivery';r.truckLocId=truck.id;
  save();render();toast('Route loaded — orders marked out for delivery');
}
function mPOD(sid){

    `<button class="btn" onclick="savePOD('${sid}')">Mark delivered</button>`);
}
function savePOD(sid){
  const s=byId('stops',sid);s.status='delivered';s.deliveredAt=now();s.podName=F('pod_n');s.notes=F('pod_note');
  const o=byId('orders',s.orderId);if(o){o.status='completed';o.updatedAt=now()}

}
function mFail(sid){

    `<button class="btn danger" onclick="saveFail('${sid}')">Mark failed</button>`);

function saveFail(sid){

function completeRoute(rid){
  const r=byId('routes',rid);r.status='completed';
  save();render();toast('Route completed');
}
function mAssignDelivery(oid){

  modal('Assign to route',`<label>Route</label><select id="ad_r">${open.map(r=>`<option value="${r.id}">${esc(r.code)} · ${esc(r.date)} · ${esc(person(r.driverId).name)}</option>`).join('')}</select>`,
    `<button class="btn" onclick="(function(){const rid=F('ad_r');closeModal();route={page:'routed',id:rid};mAddStop(rid)})()">Choose stop details</button>`);

<script>
/* ============ REPORTS ============ */
function vReports(){
  const tab=route.tab||'stock';
  const T={stock:repStock,valuation:repValuation,low:repLow,listing:repListing,ledger:repLedger,aging:repAging}[tab]||repStock;
  return `<div class="page-title">Reports</div>
  <div class="tabs">${[['stock','Stock by location'],['valuation','Valuation'],['low','Low stock'],['listing','Listing gaps'],['aging','Aging'],['ledger','Ledger']].map(([k,l])=>`<button class="${tab===k?'on':''}" onclick="go('reports',null,'${k}')">${l}</button>`).join('')}</div>
  ${T()}`;
}
function repStock(){
  return db.stores.map(s=>{
    const locIds=db.locations.filter(l=>l.storeId===s.id).map(l=>l.id);
    const rows={};
    db.rolls.filter(r=>locIds.includes(r.locationId)&&r.status!=='archived'&&r.currentYards>0).forEach(r=>{
      rows[r.variantId]=rows[r.variantId]||{cur:0,res:0,rolls:0};
      rows[r.variantId].cur+=r.currentYards;rows[r.variantId].res+=r.reservedYards;rows[r.variantId].rolls++});
    const keys=Object.keys(rows);
    return `<div class="card"><h3>${esc(s.name)}</h3>
    ${keys.length?`<div class="tblwrap"><table class="tbl"><tr><th>Variant</th><th>Rolls</th><th>On hand</th><th>Reserved</th><th>Avail</th></tr>
    ${keys.map(vid=>{const x=rows[vid];return `<tr><td>${esc(vname(vid))}</td><td>${x.rolls}</td><td class="mono">${fmt(x.cur)}</td><td class="mono">${fmt(x.res)}</td><td class="mono"><b>${fmt(x.cur-x.res)}</b></td></tr>`}).join('')}
    </table></div>`:'<span class="muted sm">No stock.</span>'}</div>`}).join('');
}
function repValuation(){
  let cost=0,retail=0,yards=0;
  const rows=db.rolls.filter(r=>r.status!=='archived'&&r.currentYards>0).map(r=>{
    const v=variant(r.variantId);const c=(r.costPerYard||v.costPerYard||0)*r.currentYards;const rt=(v.pricePerYard||0)*r.currentYards;
    cost+=c;retail+=rt;yards+=r.currentYards;
    return {r,c,rt}});
  return `<div class="stats">
    <div class="stat"><div class="n">${money(cost)}</div><div class="l">Inventory at cost</div></div>
    <div class="stat"><div class="n">${money(retail)}</div><div class="l">At retail</div></div></div>
  <div class="card"><div class="sm muted">${fmt(yards)} total yards on ${rows.length} rolls. Cost basis uses roll-specific cost, falling back to variant cost — this is the number that feeds the QuickBooks Inventory Asset export.</div></div>`;
}
function repLow(){
  const rows=lowStock();
  return `<div class="card"><h3>Below ${db.settings.lowStockYards} yd available</h3>
  ${rows.length?rows.map(x=>`<div class="li"><div class="swatch" style="background:${x.v.hex||'#eee'}"></div>
    <div class="grow"><div class="t">${esc(vname(x.v.id))}</div><div class="s mono">${esc(x.v.code)}</div></div>
    <span class="badge ${x.avail<=0?'b-warn':'b-hold'}">${fmt(x.avail)} yd</span></div>`).join(''):'<span class="muted sm">Nothing low. 🎉</span>'}</div>`;
}
function repListing(){
  const rows=db.variants.filter(v=>v.active).map(v=>{
    const miss=[];
    if(!v.photo1)miss.push('overhead photo');if(!v.photo2)miss.push('draped photo');if(!v.photo3)miss.push('mannequin photo');
    if(!v.pricePerYard)miss.push('price');if(!v.shopifyProductId)miss.push('Shopify link');
    if(!template(v.templateId).description)miss.push('description');
    return {v,miss}}).filter(x=>x.miss.length);
  return `<div class="card"><h3>Listing completeness</h3>
  ${rows.length?rows.map(x=>`<div class="li tap" onclick="go('variantd','${x.v.id}')">
    <div class="swatch" style="background:${x.v.hex||'#eee'}"></div>
    <div class="grow"><div class="t">${esc(vname(x.v.id))}</div><div class="s">${esc(x.miss.join(', '))}</div></div>
    <span class="badge b-hold">${x.miss.length}</span></div>`).join(''):'<span class="muted sm">All listings complete.</span>'}</div>`;
}
function repAging(){
  const cut=new Date(Date.now()-90*864e5).toISOString().slice(0,10);
  const rows=db.rolls.filter(r=>r.status!=='archived'&&r.currentYards>0&&(r.receivedDate||'')<cut)
    .sort((a,b)=>(a.receivedDate||'').localeCompare(b.receivedDate||''));
  return `<div class="card"><h3>On hand 90+ days</h3>
  ${rows.length?rows.map(r=>rollRow(r)).join(''):'<span class="muted sm">No aging stock (received dates are all within 90 days).</span>'}</div>`;
}
function repLedger(){
  const tx=db.transactions.slice(0,60);
  return `<div class="card"><div class="row"><h3>Inventory transaction ledger</h3>
    <button class="btn ghost small right" onclick="exportLedgerCSV()">⬇ CSV</button></div>
  <div class="tblwrap"><table class="tbl"><tr><th>When</th><th>Roll</th><th>Type</th><th>Δ yd</th><th>By</th></tr>
  ${tx.map(t=>{const r=byId('rolls',t.rollId)||{};return `<tr><td class="sm">${dshort(t.createdAt)}</td>
    <td class="mono sm tap" onclick="go('roll','${t.rollId}')">${esc(r.code||'')}</td>
    <td class="sm">${esc(txnLabel(t.type))}</td><td class="mono">${t.quantityYards>0?'+':''}${fmt(t.quantityYards)}</td>
    <td class="sm">${esc(person(t.personId).name.split(' ')[0])}</td></tr>`}).join('')}</table></div>
  <div class="sm muted" style="margin-top:8px">Showing latest 60 of ${db.transactions.length}. Export for the full ledger.</div></div>`;
}
/* ============ CSV / EXPORT helpers ============ */
function csv(rows){return rows.map(r=>r.map(c=>{c=String(c??'');return /[",\n]/.test(c)?'"'+c.replace(/"/g,'""')+'"':c}).join(',')).join('\r\n')}
function download(name,content,mime){
  const b=new Blob([content],{type:mime||'text/csv'});const u=URL.createObjectURL(b);
  const a=document.createElement('a');a.href=u;a.download=name;document.body.appendChild(a);a.click();
  setTimeout(()=>{URL.revokeObjectURL(u);a.remove()},500);
}
function exportLedgerCSV(){
  const rows=[['transaction_code','created_at','roll_code','variant_code','type','quantity_yards','previous_yards','new_yards','order','person','notes']];
  db.transactions.slice().reverse().forEach(t=>{const r=byId('rolls',t.rollId)||{};const v=variant(t.variantId);const o=byId('orders',t.orderId)||{};
    rows.push([t.code,t.createdAt,r.code||'',v.code||'',t.type,t.quantityYards,t.previousYards,t.newYards,o.number||'',person(t.personId).name,t.notes])});
  download('inventory_ledger.csv',csv(rows));toast('Ledger exported');
}
/* ============ SYNC & EXPORTS (Shopify / ERPLY / QuickBooks) ============ */
function vSync(){
  const log=db.syncLog.slice(0,12);
  const sm={cloud:'Cloud database',local:'This device (browser storage)',artifact:'This device (preview storage)',memory:'⚠ Memory only'}[syncState.mode];
  return `<div class="page-title">Sync & export</div>
  <div class="card"><h3>Database <span class="chip">${syncState.mode==='cloud'?'shared':'device'}</span></h3>
    <div class="sm"><b>${sm}</b>${syncState.mode==='cloud'?' · everyone connected sees the same data':''}</div>
    <div class="s muted">${syncState.syncing?'Syncing…':syncState.lastSync?'Last sync '+new Date(syncState.lastSync).toLocaleTimeString():shopCfg().workerUrl?'Not synced yet':'Connect the worker below to share data across devices and people'}${syncState.error?' · ⚠ '+esc(syncState.error):''}</div>
    ${shopCfg().workerUrl?`<div class="row" style="margin-top:8px">
      <button class="btn small" onclick="forceCloudPull=true;cloudPull(false).then(()=>{render();toast('Pulled rev '+syncState.rev)})">⬇ Pull latest</button>
      <button class="btn sec small" onclick="cloudPush().then(()=>toast(syncState.error?('Push failed: '+syncState.error):'Pushed rev '+syncState.rev))">⬆ Push now</button>
      <button class="btn ghost small" onclick="mSnapshots()">🕘 History</button></div>`:''}</div>
  <div class="card"><h3>Shopify <span class="chip">${shopCfg().workerUrl?'live':'not connected'}</span></h3>
    ${shopCfg().workerUrl?`
    <p class="sm muted">Connected via sync worker. Orders pull in, inventory and products push out. ${shopCfg().autoPush?'Auto-push is on: every stock change syncs within seconds.':'Auto-push is off — push manually below.'}</p>
    <div class="row" style="margin-top:8px">
      <button class="btn small" onclick="livePullOrders()">⬇ Pull new orders</button>
      <button class="btn sec small" onclick="livePushInventory()">⬆ Push inventory</button>
      <button class="btn ghost small" onclick="livePushProducts()">⬆ Push products</button></div>
    <div class="row" style="margin-top:6px">
      <button class="btn ghost small" onclick="testShopifyWorker()">Test connection</button>
      <button class="btn ghost small" onclick="mShopifySettings()">⚙ Connector settings</button></div>`
    :`<p class="sm muted">Connect the Shopify sync worker for live 2-way sync: orders in, inventory out, product push. Until then, CSV exports below match Shopify's import formats.</p>
    <div class="row" style="margin-top:8px"><button class="btn small" onclick="mShopifySettings()">Connect Shopify</button></div>`}
    <div class="row" style="margin-top:6px">
      <button class="btn ghost small" onclick="exportShopifyProducts()">⬇ Products CSV</button>
      <button class="btn ghost small" onclick="exportShopifyInventory()">⬇ Inventory CSV</button>
      <button class="btn ghost small" onclick="mImportShopifyOrders()">⬆ Import orders CSV</button></div></div>
  <div class="card"><h3>QuickBooks Online</h3>
    <p class="sm muted">Journal export built from the inventory ledger: receives debit ${esc(db.settings.qbo.invAsset)}, cuts move cost to ${esc(db.settings.qbo.cogs)}, damage/variance hits ${esc(db.settings.qbo.shrink)}. Import via QBO journal entry import or feed the same rows to the API worker.</p>
    <div class="row" style="margin-top:8px">
      <button class="btn small" onclick="exportQBOJournal()">⬇ Journal CSV</button>
      <button class="btn ghost small" onclick="mQBOAccounts()">Account mapping</button></div></div>
  <div class="card"><h3>ERPLY migration</h3>
    <p class="sm muted">Column-compatible with ERPLY product & warehouse import templates so historic ERPLY data maps 1:1 in either direction during cutover.</p>
    <div class="row" style="margin-top:8px">
      <button class="btn small" onclick="exportErplyProducts()">⬇ Products (ERPLY cols)</button>
      <button class="btn sec small" onclick="exportErplyStock()">⬇ Stock levels</button></div></div>
  <div class="card"><h3>Backup</h3><div class="row">
    <button class="btn ghost small" onclick="download('velisse_backup.json',JSON.stringify(db,null,1),'application/json')">⬇ Full JSON backup</button>
    <button class="btn ghost small" onclick="mRestore()">⬆ Restore</button></div></div>
  <div class="card"><h3>Sync log</h3>
    ${log.length?log.map(l=>`<div class="li"><div class="grow"><div class="t sm">${esc(l.shopifyObjectType)} ${esc(l.direction)}</div>
      <div class="s">${esc(l.entityType)} · ${dshort(l.at)}</div></div>
      <span class="badge ${l.status==='success'?'b-ok':'b-warn'}">${l.status}</span></div>`).join(''):'<span class="muted sm">No sync activity yet.</span>'}</div>`;
}
function exportShopifyProducts(){
  const rows=[['Handle','Title','Body (HTML)','Vendor','Type','Tags','Published','Option1 Name','Option1 Value','Variant SKU','Variant Price','Variant Compare At Price','Variant Inventory Tracker','Variant Inventory Qty','Variant Inventory Policy','Variant Fulfillment Service','Variant Requires Shipping','Image Src','Image Alt Text','Status']];
  db.templates.filter(t=>t.status==='active').forEach(t=>{
    const handle=t.code.toLowerCase().replace(/[^a-z0-9]+/g,'-');
    const ty=byId('types',t.typeId)||{};
    db.variants.filter(v=>v.templateId===t.id&&v.active).forEach((v,i)=>{
      const qty=Math.floor(db.rolls.filter(r=>r.variantId===v.id&&rollSellable(r)).reduce((a,r)=>a+rollAvail(r),0));
      rows.push([handle,i===0?t.displayName:'',i===0?(t.description||''):'','Fabric Ops',ty.name||'',
        (t.baseMaterial||'')+(t.stretch?','+t.stretch:''),i===0?'TRUE':'','Color',v.colorName,
        v.shopifySku||v.code,v.pricePerYard,'','shopify',qty,'deny','manual','TRUE',v.photo1||'',v.photo1?v.colorName+' overhead':'','active']);
      if(v.photo2)rows.push([handle,'','','','','','','','','','','','','','','','',v.photo2,v.colorName+' draped','']);
      if(v.photo3)rows.push([handle,'','','','','','','','','','','','','','','','',v.photo3,v.colorName+' mannequin','']);
      syncLog('variant',v.id,'product','push','success')});
  });
  download('shopify_products.csv',csv(rows));save();render();toast('Shopify product CSV exported');
}
function exportShopifyInventory(){
  const rows=[['SKU','Location','Available']];
  db.variants.filter(v=>v.active).forEach(v=>{
    db.stores.forEach(s=>{
      const locIds=db.locations.filter(l=>l.storeId===s.id).map(l=>l.id);
      const qty=Math.floor(db.rolls.filter(r=>r.variantId===v.id&&locIds.includes(r.locationId)&&rollSellable(r)).reduce((a,r)=>a+rollAvail(r),0));
      rows.push([v.shopifySku||v.code,s.name,qty])});
    syncLog('inventory',v.id,'inventory_item','push','success')});
  download('shopify_inventory.csv',csv(rows));save();render();toast('Inventory levels exported');
}
function mImportShopifyOrders(){
  modal('Import Shopify orders',`
    <p class="sm muted">Paste rows from Shopify's order export (Name, Email, Lineitem sku, Lineitem quantity). One line item per row: <span class="mono">#1001, a@b.com, SQ4W-EMER-YD, 3</span></p>
    <label>CSV rows</label><textarea id="imp_csv" rows="6" placeholder="#1001,rosa@x.com,SQ4W-EMER-YD,3"></textarea>`,
    `<button class="btn" onclick="importShopifyOrders()">Import</button>`);
}
function importShopifyOrders(){
  const lines=F('imp_csv').split('\n').map(l=>l.trim()).filter(Boolean);
  let made=0,orders={};
  lines.forEach(line=>{
    const p=line.split(',').map(x=>x.trim().replace(/^"|"$/g,''));
    if(p.length<4||p[0].toLowerCase()==='name')return;
    const [num,email,skuCode,qty]=p;
    const sku=db.sellableSkus.find(s=>s.sku===skuCode)||db.sellableSkus.find(s=>{const v=variant(s.variantId);return v.shopifySku===skuCode&&s.type==='yard'});
    if(!sku){syncLog('order',num,'order','pull','failed','Unknown SKU '+skuCode);return}
    if(!orders[num]){
      let cust=db.customers.find(c=>c.email===email);
      if(!cust&&email){cust={id:uid(),name:email.split('@')[0],email,type:'retail'};db.customers.push(cust)}
      const o={id:uid(),number:num||nextCode('order','SO'),shopifyOrderId:num,customerId:cust?cust.id:null,
        originStoreId:db.settings.storeId,fulfillment:'ship',status:'open',routeId:null,createdAt:now(),updatedAt:now()};
      db.orders.push(o);orders[num]=o;made++;syncLog('order',o.id,'order','pull','success')}
    addLine(orders[num].id,sku.id,parseFloat(qty)||1);
  });
  save();closeModal();go('orders');toast(made+' order(s) imported from Shopify');
}
function exportQBOJournal(){
  const q=db.settings.qbo;
  const rows=[['JournalNo','JournalDate','Memo','Account','Debit','Credit','Name']];
  let jn=1;
  db.transactions.slice().reverse().forEach(t=>{
    const r=byId('rolls',t.rollId)||{};const v=variant(t.variantId);
    const cost=Math.abs(t.quantityYards)*(r.costPerYard||v.costPerYard||0);
    if(cost<=0)return;
    const memo=t.type+' '+(r.code||'')+' '+fmt(Math.abs(t.quantityYards))+'yd';
    const date=t.createdAt.slice(0,10);
    if(t.type==='receive'||t.type==='return'){
      rows.push([jn,date,memo,q.invAsset,cost.toFixed(2),'','']);
      rows.push([jn,date,memo,q.ap,'',cost.toFixed(2),'']);jn++}
    else if(t.type==='sale'||t.type==='sample_cut'){
      rows.push([jn,date,memo,q.cogs,cost.toFixed(2),'','']);
      rows.push([jn,date,memo,q.invAsset,'',cost.toFixed(2),'']);jn++}
    else if(t.type==='damage'||(t.type==='adjustment'&&t.quantityYards<0)||t.type==='cycle_count_variance'){
      rows.push([jn,date,memo,q.shrink,cost.toFixed(2),'','']);
      rows.push([jn,date,memo,q.invAsset,'',cost.toFixed(2),'']);jn++}
    else if(t.type==='adjustment'&&t.quantityYards>0){
      rows.push([jn,date,memo,q.invAsset,cost.toFixed(2),'','']);
      rows.push([jn,date,memo,q.shrink,'',cost.toFixed(2),'']);jn++}
  });
  download('qbo_journal.csv',csv(rows));toast('QuickBooks journal exported ('+(jn-1)+' entries)');
}
function mQBOAccounts(){
  const q=db.settings.qbo;
  modal('QuickBooks accounts',`
    <label>Inventory asset</label><input id="q_inv" value="${esc(q.invAsset)}">
    <label>COGS</label><input id="q_cogs" value="${esc(q.cogs)}">
    <label>Sales income</label><input id="q_sales" value="${esc(q.sales)}">
    <label>Accounts payable</label><input id="q_ap" value="${esc(q.ap)}">
    <label>Shrinkage / adjustment</label><input id="q_sh" value="${esc(q.shrink)}">`,
    `<button class="btn" onclick="saveQBO()">Save mapping</button>`);
}
function saveQBO(){Object.assign(db.settings.qbo,{invAsset:F('q_inv'),cogs:F('q_cogs'),sales:F('q_sales'),ap:F('q_ap'),shrink:F('q_sh')});save();closeModal();toast('QBO mapping saved')}
function exportErplyProducts(){
  /* Columns aligned to ERPLY product import: code, name, group, price, cost, EAN/UPC */
  const rows=[['Product code','Product name','Product group','Sales price','Cost','Code 2 (EAN/UPC)','Unit','Status','Description']];
  db.variants.forEach(v=>{
    const t=template(v.templateId);const ty=byId('types',t.typeId)||{};
    rows.push([v.code,v.displayName,ty.name||'',v.pricePerYard,v.costPerYard,v.shopifySku||'','yard',v.active?'ACTIVE':'ARCHIVED',t.description||''])});
  download('erply_products.csv',csv(rows));toast('ERPLY-format product export ready');
}
function exportErplyStock(){
  /* ERPLY inventory registration format: warehouse code, product code, amount, cost */
  const rows=[['Warehouse code','Product code','Amount','Unit cost']];
  db.stores.forEach(s=>{
    const locIds=db.locations.filter(l=>l.storeId===s.id).map(l=>l.id);
    db.variants.forEach(v=>{
      const rolls=db.rolls.filter(r=>r.variantId===v.id&&locIds.includes(r.locationId)&&r.currentYards>0);
      if(!rolls.length)return;
      const amt=rolls.reduce((a,r)=>a+r.currentYards,0);
      const cost=rolls.reduce((a,r)=>a+r.currentYards*(r.costPerYard||v.costPerYard||0),0)/amt;
      rows.push([s.code,v.code,amt.toFixed(2),cost.toFixed(2)])})});
  download('erply_stock.csv',csv(rows));toast('ERPLY-format stock export ready');
}

<script>
/* ============ settings ============ */
