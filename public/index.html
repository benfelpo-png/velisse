/* ============ scan ============ */
let scanStream=null,scanRAF=null;
function startWarehouseInventory(){
  ensureInventorySetup();db.settings.scanMode='inventory';save();go('scan');toast('Scan a roll QR to start counting');
}
function ensureInventorySetup(){
  if(!db.stores.length)db.stores.push({id:uid(),code:'BUF',name:'Buffalo Warehouse',city:'Buffalo',active:true});
  if(!db.people.length){
    const sid=db.stores[0].id;
    db.people=[
      {id:uid(),name:'Aria',role:'warehouse',storeId:sid,canDeliver:false,active:true},
      {id:uid(),name:'Aaron',role:'warehouse',storeId:sid,canDeliver:false,active:true},
      {id:uid(),name:'Ben',role:'admin',storeId:sid,canDeliver:false,active:true}
    ];
  }
  if(!db.settings.storeId||!byId('stores',db.settings.storeId))db.settings.storeId=db.stores[0].id;
  if(!db.settings.personId||!byId('people',db.settings.personId))db.settings.personId=(db.people.find(p=>p.name==='Ben')||db.people[0]).id;
  if(!db.locations.length){
    const s=myStore()||db.stores[0];
    db.locations.push({id:uid(),storeId:s.id,type:'bin',binCode:s.code+'-RECEIVING',zone:'Opening count',qrValue:'BIN-'+s.code+'-RECEIVING',active:true});
  }
  if(!db.settings.lastScanLocationId||!byId('locations',db.settings.lastScanLocationId))db.settings.lastScanLocationId=db.locations[0].id;
}
function scanMode(){return db.settings.scanMode||'inventory'}
function setScanMode(m){db.settings.scanMode=m;save();render()}
function setScanLocation(id){db.settings.lastScanLocationId=id;save();render();toast('Counting into '+loc(id).binCode)}
function sameCode(a,b){return String(a||'').trim().toUpperCase()===String(b||'').trim().toUpperCase()}
function findRollScan(code){return db.rolls.find(r=>sameCode(r.qrValue,code)||sameCode(r.code,code))}
function findLocationScan(code){return db.locations.find(l=>sameCode(l.qrValue,code)||sameCode('BIN-'+l.binCode,code)||sameCode(l.binCode,code))}
function normalizeScanCode(raw){
  let code=String(raw||'').trim();if(!code)return '';
  try{
    const u=new URL(code);
    code=u.searchParams.get('qr')||u.searchParams.get('code')||u.searchParams.get('roll')||u.pathname.split('/').filter(Boolean).pop()||code;
  }catch(e){}
  const m=String(code).match(/(ROLL|BIN|TR|SO|RT|TXN)-[A-Za-z0-9\-]+/i);
  return m?m[0].toUpperCase():String(code).trim();
}
function scanStats(){
  const day=today();
  const ev=db.scanEvents.filter(s=>(s.at||'').slice(0,10)===day);
  return {
    total:ev.length,
    intake:ev.filter(s=>s.action==='inventory_intake').length,
    count:ev.filter(s=>s.action==='inventory_count').length,
    rolls:db.rolls.filter(r=>(r.createdAt||'').slice(0,10)===day).length
  };
}
function vScan(){
  ensureInventorySetup();
  const mode=scanMode(),stats=scanStats(),scanLoc=loc(db.settings.lastScanLocationId);
  const recent=db.scanEvents.slice(0,10);
  return `
  <div class="page-title">Scan</div>
  <div class="tabs">${[['inventory','Inventory count'],['lookup','Lookup']].map(([k,l])=>`<button class="${mode===k?'on':''}" onclick="setScanMode('${k}')">${l}</button>`).join('')}</div>
  ${mode==='inventory'?`<div class="stats">
    <div class="stat"><div class="n">${stats.intake}</div><div class="l">New rolls today</div></div>
    <div class="stat"><div class="n">${stats.count}</div><div class="l">Counts today</div></div>
  </div>
  <div class="card"><div class="cardhead"><h2>Counting into</h2></div>
    <div class="row"><select id="scan_loc" onchange="setScanLocation(this.value)" style="flex:1">${locOpts(db.settings.lastScanLocationId)}</select>
    <button class="btn ghost small" onclick="mQuickBin()">+ Bin</button></div>
    <p class="sm muted" style="margin-top:8px">Scan a bin QR to switch bins. Scan a known roll to count it. Scan an unknown roll QR to create it with that physical label.</p></div>`:''}
  <div class="card scanpane">
    <video id="scanvid" playsinline muted style="width:100%;border-radius:10px;background:#111;aspect-ratio:4/3;object-fit:cover"></video>
    <canvas id="scancv" style="display:none"></canvas>
    <div id="scanmsg" class="sm muted" style="margin-top:8px">${mode==='inventory'?'Point the camera at a roll QR. Active bin: '+esc(scanLoc.binCode):'Point the camera at a roll, bin, transfer or order QR.'}</div>
  </div>
  <div class="card"><div class="cardhead"><h2>Or type a code</h2></div>
    <div class="btnrow"><input id="scan_manual" placeholder="${mode==='inventory'?'Scan or type any roll QR value':'ROLL-000001 / BIN-BUF-RECEIVING / TR-0001 / SO-000001'}" style="flex:1">
    <button class="btn" onclick="resolveScan(F('scan_manual'))">Go</button></div>
  </div>
  <div class="card"><div class="cardhead"><h2>Recent scans</h2></div>
    ${recent.map(s=>`<div class="li"><div class="grow"><div class="t sm">${esc(s.action.replace(/_/g,' '))} · ${esc(s.entityType)}</div><div class="s">${esc(person(s.personId).name)} · ${dshort(s.at)}</div></div></div>`).join('')||'<span class="muted sm">No scans yet.</span>'}
  </div>`;
}
function initScan(){
  const vid=$('#scanvid');if(!vid)return;
  if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia){$('#scanmsg').textContent='Camera unavailable here. Type a code below.';return}
  navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}}).then(st=>{
    scanStream=st;vid.srcObject=st;vid.play();
    const cv=$('#scancv'),ctx=cv.getContext('2d',{willReadFrequently:true});
    const tick=()=>{
      if(!scanStream)return;
      if(vid.readyState===vid.HAVE_ENOUGH_DATA){
        cv.width=vid.videoWidth;cv.height=vid.videoHeight;
        ctx.drawImage(vid,0,0,cv.width,cv.height);
        try{
          const img=ctx.getImageData(0,0,cv.width,cv.height);
          const q=jsQR(img.data,cv.width,cv.height,{inversionAttempts:'dontInvert'});
          if(q&&q.data){stopScanStream();resolveScan(q.data);return}
        }catch(e){}
      }
      scanRAF=requestAnimationFrame(tick)};
    scanRAF=requestAnimationFrame(tick);
  }).catch(()=>{$('#scanmsg').textContent='Camera permission denied. Type a code below.'});
}
function stopScanStream(){
  if(scanRAF)cancelAnimationFrame(scanRAF);scanRAF=null;
  if(scanStream){scanStream.getTracks().forEach(t=>t.stop());scanStream=null}
}
function resolveScan(raw){
  const code=normalizeScanCode(raw);if(!code){toast('No code');return}
  let hit;
  if(scanMode()==='inventory'){
    hit=findLocationScan(code);
    if(hit){scanEvent('location',hit.id,'set_count_bin');db.settings.lastScanLocationId=hit.id;save();render();toast('Counting into '+hit.binCode);return}
    hit=findRollScan(code);
    if(hit){scanEvent('roll',hit.id,'scan_count');save();mInventoryCount(hit.id);return}
    mInventoryIntake(code);return;
  }
  hit=findRollScan(code);
  if(hit){scanEvent('roll',hit.id,'lookup');save();go('roll',hit.id);toast(hit.code);return}
  hit=findLocationScan(code);
  if(hit){scanEvent('location',hit.id,'lookup');save();go('locations');toast(hit.binCode);return}
  hit=db.transfers.find(t=>sameCode(t.code,code));
  if(hit){scanEvent('transfer',hit.id,'lookup');save();go('transfer',hit.id);return}
  hit=db.orders.find(o=>sameCode(o.number,code));
  if(hit){scanEvent('order',hit.id,'lookup');save();go('order',hit.id);return}
  hit=db.routes.find(r=>sameCode(r.code,code));
  if(hit){scanEvent('route',hit.id,'lookup');save();go('routed',hit.id);return}
  toast('No match for '+code);
}
function cleanCode(txt,prefix){
  const s=String(txt||'').toUpperCase().replace(/[^A-Z0-9]+/g,'-').replace(/^-|-$/g,'').slice(0,24);
  return s||prefix;
}
function uniqueCode(coll,field,base){
  let code=base,n=2;
  while(db[coll].some(x=>sameCode(x[field],code)))code=base+'-'+n++;
  return code;
}
function ensureCatalogType(width){
  let fam=db.families[0];
  if(!fam){fam={id:uid(),name:'Fabric',active:true};db.families.push(fam)}
  let ty=db.types[0];
  if(!ty){ty={id:uid(),familyId:fam.id,name:'Warehouse inventory',defaultWidth:width||54,defaultStretch:'',active:true};db.types.push(ty)}
  return ty;
}
function createQuickVariant(o){
  const ty=ensureCatalogType(o.widthIn);
  const pname=(o.productName||'Uncategorized fabric').trim();
  let t=db.templates.find(x=>sameCode(x.displayName,pname));
  if(!t){
    const tcode=uniqueCode('templates','code',cleanCode(pname,'FAB'));
    t={id:uid(),typeId:ty.id,code:tcode,name:pname,displayName:pname,description:'',patternPrint:'',
      baseMaterial:'',construction:'',stretch:ty.defaultStretch||'',opacity:'',widthIn:o.widthIn||ty.defaultWidth||54,
      status:'active',createdAt:now(),updatedAt:now()};
    db.templates.push(t);
  }
  const color=(o.colorName||'Default').trim();
  const base=cleanCode(o.variantCode||((t.code||pname)+'-'+color),'FAB-VAR');
  const code=uniqueCode('variants','code',base);
  const v={id:uid(),templateId:t.id,code,colorFamily:'',colorName:color,hex:o.hex||'',finish:'',
    displayName:t.displayName+' — '+color,shopifySku:code,shopifyProductId:'',shopifyVariantId:'',
    pricePerYard:o.pricePerYard||0,costPerYard:o.costPerYard||0,
    photo1Type:'overhead',photo1:'',photo2Type:'draped',photo2:'',photo3Type:'mannequin',photo3:'',
    active:true,createdAt:now(),updatedAt:now()};
  db.variants.push(v);
  db.sellableSkus.push({id:uid(),variantId:v.id,sku:v.code+'-YD',type:'yard',uom:'yard',drawQty:1,price:v.pricePerYard,active:true});
  return v;
}
function formLocation(prefix){
  const nb=F(prefix+'_newbin');
  if(nb){
    const s=myStore()||db.stores[0];
    let l=db.locations.find(x=>sameCode(x.binCode,nb)&&x.storeId===s.id);
    if(!l){l={id:uid(),storeId:s.id,type:'bin',binCode:nb.toUpperCase(),zone:'',qrValue:'BIN-'+nb.toUpperCase(),active:true};db.locations.push(l)}
    return l.id;
  }
  return F(prefix+'_loc')||db.settings.lastScanLocationId||db.locations[0].id;
}
function adoptRollSeq(code){
  const m=String(code||'').match(/^ROLL-(\d+)$/i);
  if(m)db.seq.roll=Math.max(db.seq.roll||0,parseInt(m[1],10));
}
function createInventoryRoll(o){
  ensureInventorySetup();
  const yards=Number(o.yards)||0;if(yards<=0)throw new Error('Enter measured yards');
  let v=o.variantId&&o.variantId!=='__new'?byId('variants',o.variantId):null;
  if(!v)v=createQuickVariant(o);
  const useScannedCode=/^ROLL-\d+$/i.test(o.qr)&&!db.rolls.some(r=>sameCode(r.code,o.qr));
  const code=useScannedCode?o.qr.toUpperCase():nextCode('roll','ROLL');
  adoptRollSeq(code);
  const r={id:uid(),variantId:v.id,code,lot:o.lot||'',qrValue:o.qr||code,originalYards:yards,currentYards:0,reservedYards:0,
    widthIn:o.widthIn||template(v.templateId).widthIn,condition:o.condition||'new',receivedDate:today(),supplierId:null,
    costPerYard:o.costPerYard||v.costPerYard,locationId:o.locationId,status:'available',createdAt:now(),updatedAt:now()};
  db.rolls.push(r);txn(r,'receive',yards,{notes:(o.notes||'Opening inventory count')+(o.qr&&!sameCode(o.qr,code)?' · physical QR '+o.qr:'')});
  db.rollHistory.unshift({id:uid(),rollId:r.id,fromLocationId:null,toLocationId:o.locationId,movedAt:now(),personId:me().id,reason:'opening inventory count'});
  scanEvent('roll',r.id,'inventory_intake');
  db.settings.lastScanLocationId=o.locationId;
  return r;
}
function countInventoryRoll(id,o){
  const r=byId('rolls',id);if(!r)throw new Error('Roll not found');
  const nY=Number(o.yards);if(!(nY>=0))throw new Error('Enter measured yards');
  const d=Math.round((nY-r.currentYards)*100)/100;
  if(o.variantId&&o.variantId!==r.variantId)r.variantId=o.variantId;
  r.lot=o.lot||'';r.condition=o.condition||r.condition||'new';
  if(d)txn(r,'cycle_count_variance',d,{notes:o.notes||'QR inventory count'});
  else{r.updatedAt=now();db.transactions.unshift({id:uid(),code:nextCode('txn','TXN',7),rollId:r.id,variantId:r.variantId,
    type:'cycle_count_variance',quantityYards:0,previousYards:r.currentYards,newYards:r.currentYards,personId:me().id,
    notes:o.notes||'QR inventory count verified',createdAt:now()})}
  if(nY>0&&r.status==='sold_out')r.status='available';
  if(o.locationId&&o.locationId!==r.locationId)moveRoll(r,o.locationId,'inventory count');
  scanEvent('roll',r.id,'inventory_count');
  db.settings.lastScanLocationId=o.locationId||r.locationId;
  return r;
}
function mInventoryIntake(qr){
  ensureInventorySetup();
  const locId=db.settings.lastScanLocationId||db.locations[0].id;
  const variants=db.variants.filter(v=>v.active);
  modal('Inventory roll QR',`
    <div class="card" style="margin:-2px 0 10px"><div class="sm muted">Scanned physical QR</div><div class="mono" style="word-break:break-all">${esc(qr)}</div></div>
    <input type="hidden" id="inv_qr" value="${esc(qr)}">
    <label>Product / variant</label><select id="inv_variant">${variants.map(v=>`<option value="${v.id}">${esc(vname(v.id))}</option>`).join('')}<option value="__new" ${variants.length?'':'selected'}>+ Create new product from this count</option></select>
    <div class="grid2"><div><label>New product name</label><input id="inv_product" placeholder="Stretch Velvet"></div>
    <div><label>Color / variant</label><input id="inv_color" placeholder="Burgundy"></div></div>
    <div class="grid2"><div><label>Variant code</label><input id="inv_vcode" placeholder="VLST-BURG"></div>
    <div><label>Hex swatch</label><input id="inv_hex" placeholder="#6b1f2a"></div></div>
    <div class="grid2"><div><label>Measured yards</label><input id="inv_yards" type="number" step="0.125" inputmode="decimal"></div>
    <div><label>Lot #</label><input id="inv_lot"></div></div>
    <label>Bin / location</label><select id="inv_loc">${locOpts(locId)}</select>
    <label>Or create bin now</label><input id="inv_newbin" placeholder="WH-A-01-1">
    <div class="grid2"><div><label>Width (in)</label><input id="inv_width" type="number" step="0.25"></div>
    <div><label>Cost / yd</label><input id="inv_cost" type="number" step="0.01"></div></div>
    <label>Condition</label><select id="inv_condition">${['new','partial','remnant','damaged','hold'].map(c=>`<option>${c}</option>`).join('')}</select>
    <label>Notes</label><input id="inv_notes" placeholder="Opening count, shelf tag, defect note…">`,
    `<button class="btn" onclick="saveInventoryIntake(true)">Save & scan next</button><button class="btn ghost" onclick="saveInventoryIntake(false)">Save & view</button>`);
}
function saveInventoryIntake(next){
  try{
    const locId=formLocation('inv');
    const r=createInventoryRoll({qr:F('inv_qr'),variantId:F('inv_variant'),productName:F('inv_product'),colorName:F('inv_color'),
      variantCode:F('inv_vcode'),hex:F('inv_hex'),yards:FN('inv_yards'),lot:F('inv_lot'),locationId:locId,
      widthIn:FN('inv_width'),costPerYard:FN('inv_cost'),condition:F('inv_condition'),notes:F('inv_notes')});
    save();closeModal();next?go('scan'):go('roll',r.id);toast(r.code+' inventoried');
  }catch(e){toast(e.message)}
}
function mInventoryCount(id){
  const r=byId('rolls',id),locId=db.settings.lastScanLocationId||r.locationId;
  modal('Count '+r.code,`
    <div class="sm muted">System shows ${fmt(r.currentYards)} yd · scanned QR ${esc(r.qrValue||r.code)}</div>

/* ============ shopify live connector ============ */
function shopCfg(){
  if(!db.settings.shopify)db.settings.shopify={};
  const s=db.settings.shopify;
  if(s.workerUrl===undefined)s.workerUrl='';
  if(s.apiKey===undefined)s.apiKey='';
  if(s.autoPush===undefined)s.autoPush=false;
  if(!s.locationMap)s.locationMap={};
  return s;
}
function mShopifySettings(){
  const s=shopCfg();
  modal('Shopify connector',`
    <label>Sync worker URL</label><input id="sh_url" value="${esc(s.workerUrl)}" placeholder="https://velisse-velisse-inventory-system.vercel.app/api">
    <label>Worker API key</label><input id="sh_key" value="${esc(s.apiKey)}" placeholder="Shared secret set in the worker">
    <label class="chk"><input type="checkbox" id="sh_auto" ${s.autoPush?'checked':''}> Auto-push inventory after every stock change</label>
    <div style="border-top:1px dotted var(--line);margin:10px 0;padding-top:10px">
      <label>Store → Shopify location ID</label>
      ${db.stores.map(st=>`<div class="row" style="margin-bottom:6px"><span class="sm" style="min-width:110px">${esc(st.name)}</span>
        <input id="sh_loc_${st.id}" value="${esc(s.locationMap[st.id]||'')}" placeholder="gid://shopify/Location/…" style="flex:1"></div>`).join('')}
      <p class="sm muted">Get location IDs from Test connection after saving the URL and key. Stores without a mapping are skipped on inventory push.</p>
    </div>`,
    `<button class="btn" onclick="saveShopifySettings()">Save</button>`);
}
function saveShopifySettings(){
  const s=shopCfg();
  s.workerUrl=F('sh_url').trim().replace(/\/+$/,'');
  s.apiKey=F('sh_key').trim();
  s.autoPush=$('#sh_auto').checked;
  db.stores.forEach(st=>{const v=F('sh_loc_'+st.id);if(v!==null)s.locationMap[st.id]=v.trim()});
  save();closeModal();render();toast('Connector saved');
}
async function workerFetch(path,body){
  const s=shopCfg();
  if(!s.workerUrl)throw new Error('No worker URL configured');
  const res=await fetch(s.workerUrl+path,{
    method:body?'POST':'GET',
    headers:{'Content-Type':'application/json','X-Api-Key':s.apiKey},
    body:body?JSON.stringify(body):undefined});
  const txt=await res.text();
  let json;try{json=JSON.parse(txt)}catch(e){json={raw:txt}}
  if(!res.ok){const err=new Error(json.error||('HTTP '+res.status));err.status=res.status;err.conflict=res.status===409;err.server=json;throw err}
  return json;
}
async function testShopifyWorker(){
  toast('Testing…');
  try{
    const r=await workerFetch('/health');
    let msg='Worker OK · shop '+(r.shop||'?');
    if(r.locations&&r.locations.length){
      msg+='\n\nShopify locations:\n'+r.locations.map(l=>l.name+'\n'+l.id).join('\n');
      modal('Connection OK',`<p class="sm">Shop: <b>${esc(r.shop)}</b></p>
        <p class="sm" style="margin-top:8px">Locations (paste an ID into each store mapping):</p>
        ${r.locations.map(l=>`<div class="li"><div class="grow"><div class="t sm">${esc(l.name)}</div><div class="s mono">${esc(l.id)}</div></div></div>`).join('')}`,
        `<button class="btn" onclick="closeModal();mShopifySettings()">Open settings</button>`);
    }else toast(msg);
    syncLog('worker',null,'health','pull','success');
  }catch(e){syncLog('worker',null,'health','pull','failed',e.message);save();render();toast('Connection failed: '+e.message)}
  save();
}
/* available yards per variant per store, sellable rolls only */
function availableByVariantStore(){
  const out={};
  db.rolls.forEach(r=>{
    if(!rollSellable(r))return;
    const l=loc(r.locationId);if(!l.storeId)return;
    const k=r.variantId+'|'+l.storeId;
    out[k]=(out[k]||0)+rollAvail(r);
  });
  return out;
}
async function livePushInventory(){
  const s=shopCfg();
  const avail=availableByVariantStore();
  const items=[];
  db.variants.forEach(v=>{
    const sku=db.sellableSkus.find(k=>k.variantId===v.id&&k.uom==='yard')||db.sellableSkus.find(k=>k.variantId===v.id);
    if(!sku)return;
    db.stores.forEach(st=>{
      const locId=s.locationMap[st.id];if(!locId)return;
      const yards=avail[v.id+'|'+st.id]||0;
      items.push({sku:sku.sku||v.code,locationId:locId,available:Math.floor(yards),
        inventoryItemId:v.shopifyInventoryItemId||null});
    });
  });
  if(!items.length){toast('Nothing to push — map store locations first');return}
  toast('Pushing '+items.length+' levels…');
  try{
    const r=await workerFetch('/inventory/set',{items});
    (r.results||[]).forEach(x=>{
      if(x.inventoryItemId){const v=db.variants.find(vv=>(db.sellableSkus.find(k=>k.variantId===vv.id&&(k.sku||vv.code)===x.sku)));if(v)v.shopifyInventoryItemId=x.inventoryItemId}
    });
    syncLog('inventory',null,'inventory_level','push',r.errors&&r.errors.length?'partial':'success',(r.errors||[]).slice(0,3).join('; '));
    save();render();toast('Inventory pushed · '+(r.updated||0)+' set'+(r.errors&&r.errors.length?', '+r.errors.length+' errors':''));
  }catch(e){syncLog('inventory',null,'inventory_level','push','failed',e.message);save();render();toast('Push failed: '+e.message)}
}
async function livePushProducts(){
  const payload=db.variants.filter(v=>v.active!==false).map(v=>{
    const t=template(v.templateId);const ty=byId('types',t.typeId)||{};
    const sku=db.sellableSkus.find(k=>k.variantId===v.id&&k.uom==='yard')||db.sellableSkus.find(k=>k.variantId===v.id);
    return {variantCode:v.code,title:t.displayName,color:v.colorName,productType:ty.name||'',
      description:t.description||'',price:v.pricePerYard,sku:(sku&&sku.sku)||v.code,
      photos:[v.photo1,v.photo2,v.photo3].filter(u=>u&&/^https?:/.test(u)),
      shopifyProductId:v.shopifyProductId||null,shopifyVariantId:v.shopifyVariantId||null};
  });
  if(!payload.length){toast('No active variants');return}
  toast('Pushing '+payload.length+' variants…');
  try{
    const r=await workerFetch('/products/push',{variants:payload});
    (r.results||[]).forEach(x=>{
      const v=db.variants.find(vv=>vv.code===x.variantCode);
      if(v){v.shopifyProductId=x.productId||v.shopifyProductId;v.shopifyVariantId=x.variantId||v.shopifyVariantId;
        v.shopifyInventoryItemId=x.inventoryItemId||v.shopifyInventoryItemId;
        syncLog('variant',v.id,'product','push',x.error?'failed':'success',x.error||'')}
    });
    save();render();toast('Products pushed · '+(r.created||0)+' created, '+(r.updated||0)+' updated');
  }catch(e){syncLog('product',null,'product','push','failed',e.message);save();render();toast('Push failed: '+e.message)}
}
async function livePullOrders(){
  toast('Checking for orders…');
  try{
    const r=await workerFetch('/orders/pending');
    const pend=r.orders||[];
    if(!pend.length){toast('No new Shopify orders');return}
    let made=0;const ackIds=[];
    pend.forEach(so=>{
      if(db.orders.find(o=>o.shopifyOrderId===String(so.id))){ackIds.push(so.id);return}
      let cust=db.customers.find(c=>so.email&&c.email===so.email);
      if(!cust&&(so.email||so.customerName)){cust={id:uid(),name:so.customerName||so.email,email:so.email||'',phone:so.phone||'',address:so.address||'',city:so.city||'',postal:so.zip||''};db.customers.push(cust)}
      const o={id:uid(),number:nextCode('order','SO'),shopifyOrderId:String(so.id),shopifyName:so.name||'',
        customerId:cust?cust.id:null,originStoreId:db.settings.storeId,
        fulfillment:so.shipping?'ship':'pickup',status:'open',routeId:null,createdAt:now(),updatedAt:now()};
      let lines=0;
      (so.lineItems||[]).forEach(li=>{
        const sku=db.sellableSkus.find(k=>k.sku===li.sku)||db.sellableSkus.find(k=>{const v=variant(k.variantId);return v.code===li.sku});
        if(sku){addLine(o.id,sku.id,li.quantity||1);lines++}
      });
      if(lines){db.orders.push(o);autoAllocateOrder(o.id);made++;
        syncLog('order',o.id,'order','pull','success')}
      else syncLog('order',null,'order','pull','failed','No SKU match for Shopify order '+(so.name||so.id));
      ackIds.push(so.id);
    });
    if(ackIds.length)await workerFetch('/orders/ack',{ids:ackIds});
    save();render();toast(made+' order'+(made===1?'':'s')+' imported & auto-reserved');
  }catch(e){syncLog('order',null,'order','pull','failed',e.message);save();render();toast('Pull failed: '+e.message)}
}
/* auto-push: debounce inventory pushes after stock-changing ledger events */
let autoPushTimer=null;
function scheduleAutoPush(){
  const s=shopCfg();
  if(!s.workerUrl||!s.autoPush)return;
  clearTimeout(autoPushTimer);
  autoPushTimer=setTimeout(()=>{livePushInventory()},4000);
}
/* wrap txn + moveRoll so every stock change schedules a push */
const _txn=txn;
txn=function(roll,type,delta,opts){_txn(roll,type,delta,opts);
  if(['receive','sale','sample_cut','adjustment','damage','return','reserve','release_reservation','cycle_count_variance','transfer'].includes(type))scheduleAutoPush()};
const _moveRoll=moveRoll;
moveRoll=function(roll,toLocId,reason){_moveRoll(roll,toLocId,reason);scheduleAutoPush()};


/* ============ cloud snapshots (point-in-time restore) ============ */
async function mSnapshots(){
  toast('Loading history…');
  try{
    const r=await workerFetch('/db/snapshots');
    const snaps=r.snapshots||[];
    modal('Database history',snaps.length?snaps.map(s=>`<div class="li"><div class="grow">
      <div class="t sm">Rev ${s.rev} · ${esc(s.device||'')}</div>
      <div class="s">${new Date(s.at).toLocaleString()} · ${fmt((s.bytes||0)/1024)} KB</div></div>
      <button class="btn ghost small" onclick="restoreSnapshot(${s.rev})">Restore</button></div>`).join('')
      :'<p class="sm muted">No snapshots yet. One is kept for each save to the cloud database (last 30).</p>','');
  }catch(e){toast('History failed: '+e.message)}
}
async function restoreSnapshot(rev){
  if(!confirm('Restore rev '+rev+'? Current state is snapshotted first.'))return;
  try{
    const r=await workerFetch('/db/restore',{rev});
    await cloudPull(false);closeModal();render();toast('Restored rev '+rev+' → new rev '+syncState.rev);
  }catch(e){toast('Restore failed: '+e.message)}
}

loadDB().then(()=>{render()});
